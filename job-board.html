<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>게시판 — 지텔프IBT 대학컨설팅</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#F8FAFF;color:#1E293B;}

    /* ── 헤더 ── */
    header{position:sticky;top:0;z-index:50;background:#0D1B2A;box-shadow:0 1px 0 rgba(255,255,255,.06),0 4px 16px rgba(0,0,0,.3);}
    .hinner{max-width:1100px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .hlogo{font-size:1rem;font-weight:800;color:#fff;text-decoration:none;white-space:nowrap;}
    .hnav{display:none;align-items:center;gap:4px;}
    .nav-link{padding:8px 12px;border-radius:8px;color:rgba(255,255,255,.75);text-decoration:none;transition:background .18s,color .18s;font-size:0.85rem;font-weight:600;white-space:nowrap;}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,.12);color:#fff;}
    .hbtn{padding:10px 18px;border-radius:8px;font-size:0.85rem;font-weight:700;color:#fff;text-decoration:none;min-height:40px;display:inline-flex;align-items:center;background:linear-gradient(135deg,#1E4D8C,#0891B2);}
    .hbtn:hover{opacity:.9;}
    .hbtn-gold{background:linear-gradient(135deg,#D97706,#F59E0B);}
    .hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:rgba(255,255,255,.12);border:none;padding:6px;border-radius:8px;}
    .hamburger span{display:block;height:2px;background:#fff;border-radius:2px;transition:transform .25s,opacity .25s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-menu{display:none;flex-direction:column;background:#0D1B2A;border-top:1px solid rgba(255,255,255,.1);padding:12px 16px 16px;position:sticky;top:64px;z-index:49;box-shadow:0 4px 12px rgba(0,0,0,.4);}
    .mobile-menu a{padding:14px 12px;font-size:0.95rem;font-weight:600;color:rgba(255,255,255,.85);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.08);}
    .mobile-menu a:last-child{border-bottom:none;}
    .mobile-menu .mbtn{margin-top:12px;display:block;text-align:center;padding:12px;border-radius:50px;background:linear-gradient(135deg,#1E4D8C,#0891B2);color:#fff;font-weight:700;text-decoration:none;}
    .mobile-menu.open{display:flex;}
    @media(min-width:769px){.hnav{display:flex;}.hbtn{display:inline-flex;}.hamburger{display:none;}}

    /* ── 페이지 바 ── */
    .page-bar{background:#fff;border-bottom:1px solid #E2E8F0;padding:20px 16px;}
    .page-bar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .page-bar-inner h1{font-size:1.2rem;font-weight:800;color:#0B1D3A;}

    /* ── 본문 ── */
    .wrap{max-width:1100px;margin:0 auto;padding:28px 16px 80px;}
    .board-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .board-top-count{font-size:0.85rem;color:#64748B;}
    .board-top-btns{display:flex;gap:8px;}

    /* ── 게시판 테이블 ── */
    .board-table-wrap{border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);width:100%;}
    .board-table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;}
    .board-table thead{background:#1E3A8A;color:#fff;}
    .board-table th{padding:13px 16px;font-size:0.83rem;font-weight:700;text-align:center;}
    .board-table td{padding:13px 16px;font-size:0.85rem;border-bottom:1px solid #F1F5F9;text-align:center;color:#334155;}
    .board-table tr:last-child td{border-bottom:none;}
    .board-table tr:hover td{background:#F8FAFF;cursor:pointer;}
    .td-title{text-align:left!important;font-weight:600;color:#1E293B;}
    .td-title:hover{color:#1E4D8C;}
    .td-meta{display:none;}
    .no-data{text-align:center;padding:60px 0;color:#94A3B8;font-size:0.9rem;cursor:default!important;}
    .notice-row td{background:#FFF9E6!important;}
    .notice-row:hover td{background:#FFF3CD!important;}
    .notice-badge{display:inline-block;padding:2px 7px;border-radius:4px;background:#F59E0B;color:#fff;font-size:0.7rem;font-weight:800;margin-right:6px;vertical-align:middle;}
    .admin-manage{display:inline-flex;gap:4px;margin-left:8px;vertical-align:middle;}
    .admin-manage button{padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:700;border:none;cursor:pointer;}
    .btn-edit-sm{background:#0891B2;color:#fff;}
    .btn-del-sm{background:#DC2626;color:#fff;}

    /* ── 토스트 ── */
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:12px 24px;border-radius:50px;font-size:0.9rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.success{background:#059669;}
    .toast.error{background:#DC2626;}

    /* ── 모달 공통 ── */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px;}
    .modal-bg.open{display:flex;}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:780px;padding:36px 32px;box-shadow:0 8px 40px rgba(0,0,0,.18);}
    .modal-sm{max-width:380px;}
    .modal h3{font-size:1.1rem;font-weight:800;color:#0B1D3A;margin-bottom:20px;}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    .form-group label{font-size:0.8rem;font-weight:700;color:#475569;}
    .form-group input,.form-group textarea{padding:10px 14px;border:1.5px solid #CBD5E1;border-radius:8px;font-size:0.9rem;outline:none;font-family:inherit;transition:border-color .15s;}
    .form-group input:focus,.form-group textarea:focus{border-color:#1E4D8C;}
    .form-group textarea{resize:vertical;min-height:120px;}
    .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap;}

    /* ── 버튼 ── */
    .btn-cancel{padding:9px 20px;border-radius:8px;border:1.5px solid #CBD5E1;background:#fff;color:#475569;font-size:0.85rem;font-weight:700;cursor:pointer;}
    .btn-cancel:hover{background:#F1F5F9;}
    .btn-submit{padding:9px 22px;border-radius:8px;background:#1E4D8C;color:#fff;font-size:0.85rem;font-weight:700;border:none;cursor:pointer;}
    .btn-submit:hover{background:#163870;}
    .btn-danger{padding:9px 22px;border-radius:8px;background:#DC2626;color:#fff;font-size:0.85rem;font-weight:700;border:none;cursor:pointer;}
    .btn-danger:hover{background:#B91C1C;}
    .btn-admin{padding:9px 18px;border-radius:8px;background:#7C3AED;color:#fff;font-size:0.83rem;font-weight:700;border:none;cursor:pointer;}
    .btn-admin:hover{background:#6D28D9;}
    .btn-write{padding:9px 18px;border-radius:8px;background:#1E4D8C;color:#fff;font-size:0.83rem;font-weight:700;border:none;cursor:pointer;}
    .btn-write:hover{background:#163870;}
    .btn-notice{padding:9px 22px;border-radius:8px;background:#F59E0B;color:#fff;font-size:0.85rem;font-weight:700;border:none;cursor:pointer;}
    .btn-notice:hover{background:#D97706;}
    .btn-notice.on{background:#1E4D8C;}

    /* ── 글 상세 ── */
    .detail-meta{display:flex;gap:16px;font-size:0.78rem;color:#94A3B8;margin-bottom:16px;flex-wrap:wrap;}
    .detail-content{background:#F8FAFF;border-radius:8px;padding:20px;font-size:0.95rem;line-height:1.8;color:#334155;white-space:pre-wrap;min-height:180px;margin-bottom:20px;}
    .detail-btns{display:flex;gap:8px;flex-wrap:wrap;}

    /* ══ 모바일 최적화 ══ */
    @media(max-width:640px){
      .wrap{padding:20px 12px 100px;}
      .board-top{flex-wrap:wrap;gap:8px;}
      .btn-write,.btn-admin{padding:7px 14px;font-size:0.78rem;}
      .board-table thead{display:none;}
      .board-table,.board-table tbody,.board-table tr{display:block;width:100%;}
      .board-table tr{background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.07);overflow:hidden;border-bottom:none!important;}
      .notice-row{border-left:4px solid #F59E0B!important;}
      .board-table td{display:none;}
      .td-title{display:block!important;padding:14px 14px 6px;font-size:0.9rem;border-bottom:none!important;}
      .td-meta{display:flex!important;align-items:center;gap:10px;padding:6px 14px 12px;font-size:0.75rem;color:#94A3B8;border-bottom:none!important;text-align:left!important;}
      .modal-bg{padding:0;align-items:flex-end;}
      .modal{border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding:24px 20px 32px;}
      .modal h3{font-size:1rem;margin-bottom:16px;}
      .modal-btns{justify-content:stretch;}
      .modal-btns button{flex:1;}
      .detail-btns button{flex:1;padding:9px 8px;font-size:0.78rem;}
      .toast{font-size:0.82rem;padding:10px 18px;bottom:16px;max-width:90vw;text-align:center;white-space:normal;}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://byzulmxcuhsrjdphmuym.supabase.co',
    'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs'
  );
  const ADMIN_PW = 'gtelp2024';

  let posts = [];
  let currentPostId = null;
  let isAdmin = false;

  async function hashPw(pw) {
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode('gtelp_board_' + pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function toggleMenu() {
    document.getElementById('mobile-menu').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('open');
  }

  // ── 데이터 로드 ──
  async function fetchPosts() {
    document.getElementById('board-body').innerHTML =
      '<tr><td colspan="5" class="no-data">불러오는 중...</td></tr>';
    const { data, error } = await db.from('job_board')
      .select('id, title, author, content, views, created_at, is_notice')
      .order('is_notice', { ascending: false })
      .order('created_at', { ascending: false });
    if (error) { console.error('fetchPosts error:', error); return; }
    posts = data || [];
    renderBoard();
  }

  // ── 렌더링 ──
  function renderBoard() {
    const tbody = document.getElementById('board-body');
    document.getElementById('total-count').textContent = posts.length;

    if (posts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="no-data">등록된 게시글이 없습니다.</td></tr>';
      return;
    }

    const noticeCount = posts.filter(p => p.is_notice).length;
    let regularIdx = 0;

    tbody.innerHTML = posts.map((p) => {
      const isNotice = p.is_notice;
      const num = isNotice ? '공지' : (posts.length - noticeCount - regularIdx++);
      const date = new Date(p.created_at).toLocaleDateString('ko-KR', { year:'2-digit', month:'2-digit', day:'2-digit' });
      const noticeBadge = isNotice ? `<span class="notice-badge">📌 공지</span>` : '';
      const adminBtns = isAdmin
        ? `<span class="admin-manage">
            <button class="btn-edit-sm" onclick="event.stopPropagation();quickEdit(${p.id})">수정</button>
            <button class="btn-del-sm" onclick="event.stopPropagation();quickDelete(${p.id})">삭제</button>
           </span>`
        : '';
      return `<tr class="${isNotice ? 'notice-row' : ''}" onclick="openDetail(${p.id})">
        <td style="font-weight:${isNotice ? '800' : '400'};color:${isNotice ? '#F59E0B' : ''};">${num}</td>
        <td class="td-title">${noticeBadge}${escHtml(p.title)}${adminBtns}</td>
        <td>${escHtml(p.author || '관리자')}</td>
        <td>${date}</td>
        <td>${p.views}</td>
        <td class="td-meta">
          <span>${escHtml(p.author || '관리자')}</span>
          <span>·</span>
          <span>${date}</span>
          <span>·</span>
          <span>👁 ${p.views}</span>
        </td>
      </tr>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 글 상세 ──
  async function openDetail(id) {
    currentPostId = id;
    const post = posts.find(p => p.id === id);
    if (!post) return;

    post.views++;
    await db.from('job_board').update({ views: post.views }).eq('id', post.id);

    document.getElementById('d-title').textContent  = post.title;
    document.getElementById('d-author').textContent = '✍️ ' + (post.author || '관리자');
    document.getElementById('d-date').textContent   = '📅 ' + new Date(post.created_at).toLocaleString('ko-KR');
    document.getElementById('d-views').textContent  = '👁 ' + post.views;
    document.getElementById('d-content').textContent = post.content;

    const showAdmin = isAdmin;
    document.getElementById('d-edit-btn').style.display   = showAdmin ? 'inline-block' : 'none';
    document.getElementById('d-del-btn').style.display    = showAdmin ? 'inline-block' : 'none';
    const noticeBtn = document.getElementById('d-notice-btn');
    if (showAdmin) {
      noticeBtn.style.display = 'inline-block';
      noticeBtn.textContent = post.is_notice ? '📌 공지 해제' : '📌 공지 설정';
      noticeBtn.className = 'btn-notice' + (post.is_notice ? ' on' : '');
    } else {
      noticeBtn.style.display = 'none';
    }

    document.getElementById('detail-modal').classList.add('open');
    renderBoard();
  }

  function closeDetailModal() {
    document.getElementById('detail-modal').classList.remove('open');
    currentPostId = null;
  }

  // ── 관리자 로그인 ──
  function toggleAdmin() {
    if (isAdmin) {
      isAdmin = false;
      document.getElementById('admin-btn').textContent = '🔐 관리자';
      document.getElementById('admin-btn').style.background = '';
      document.getElementById('write-btn').style.display = 'none';
      renderBoard();
    } else {
      document.getElementById('admin-pw-input').value = '';
      document.getElementById('admin-modal').classList.add('open');
      setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
    }
  }

  function closeAdminModal() {
    document.getElementById('admin-modal').classList.remove('open');
  }

  function confirmAdminLogin() {
    const pw = document.getElementById('admin-pw-input').value;
    if (pw !== ADMIN_PW) { showToast('비밀번호가 틀렸습니다.', 'error'); return; }
    isAdmin = true;
    closeAdminModal();
    document.getElementById('admin-btn').textContent = '🛡️ 관리자 ON';
    document.getElementById('admin-btn').style.background = '#059669';
    document.getElementById('write-btn').style.display = 'inline-block';
    renderBoard();
    showToast('관리자 모드 활성화', 'success');
  }

  // ── 글쓰기 (관리자) ──
  function openWriteModal() {
    if (!isAdmin) return;
    document.getElementById('w-title').value   = '';
    document.getElementById('w-content').value = '';
    document.getElementById('write-modal').classList.add('open');
  }
  function closeWriteModal() { document.getElementById('write-modal').classList.remove('open'); }

  async function submitPost() {
    const title   = document.getElementById('w-title').value.trim();
    const content = document.getElementById('w-content').value.trim();
    if (!title)   { showToast('제목을 입력하세요.', 'error'); return; }
    if (!content) { showToast('내용을 입력하세요.', 'error'); return; }

    const pw_hash = await hashPw(ADMIN_PW);
    const { error } = await db.from('job_board').insert({ title, author: '관리자', content, pw_hash });
    if (error) { showToast('오류: ' + (error.message || JSON.stringify(error)), 'error'); console.error(error); return; }
    closeWriteModal();
    await fetchPosts();
    showToast('등록되었습니다.', 'success');
  }

  // ── 수정 (관리자) ──
  function openEditModal() {
    if (!isAdmin) return;
    const post = posts.find(p => p.id === currentPostId);
    if (!post) return;
    document.getElementById('e-title').value   = post.title;
    document.getElementById('e-content').value = post.content;
    document.getElementById('edit-modal').classList.add('open');
  }
  function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

  async function submitEdit() {
    const title   = document.getElementById('e-title').value.trim();
    const content = document.getElementById('e-content').value.trim();
    if (!title)   { showToast('제목을 입력하세요.', 'error'); return; }
    if (!content) { showToast('내용을 입력하세요.', 'error'); return; }

    const { error } = await db.from('job_board')
      .update({ title, content })
      .eq('id', currentPostId);
    if (error) { showToast('수정 중 오류가 발생했습니다.', 'error'); console.error(error); return; }
    closeEditModal();
    closeDetailModal();
    await fetchPosts();
    showToast('수정되었습니다.', 'success');
  }

  // ── 삭제 (관리자) ──
  async function deleteCurrentPost() {
    if (!isAdmin || !currentPostId) return;
    if (!confirm('정말 삭제하시겠습니까?')) return;
    await doDelete(currentPostId);
    closeDetailModal();
  }

  async function quickDelete(id) {
    if (!isAdmin) return;
    if (!confirm('정말 삭제하시겠습니까?')) return;
    await doDelete(id);
  }

  function quickEdit(id) {
    if (!isAdmin) return;
    const post = posts.find(p => p.id === id);
    if (!post) return;
    currentPostId = id;
    document.getElementById('e-title').value   = post.title;
    document.getElementById('e-content').value = post.content;
    document.getElementById('edit-modal').classList.add('open');
  }

  async function doDelete(id) {
    const { data, error } = await db.from('job_board').delete().eq('id', id).select();
    if (error) { showToast('삭제 중 오류가 발생했습니다.', 'error'); console.error(error); return; }
    if (!data || data.length === 0) { showToast('삭제 실패 — RLS를 확인하세요.', 'error'); return; }
    await fetchPosts();
    showToast('삭제되었습니다.', 'success');
  }

  // ── 공지 설정 (관리자) ──
  async function toggleNotice() {
    if (!isAdmin) return;
    const post = posts.find(p => p.id === currentPostId);
    if (!post) return;
    const newVal = !post.is_notice;
    const { error } = await db.from('job_board').update({ is_notice: newVal }).eq('id', currentPostId);
    if (error) { showToast('공지 설정 중 오류가 발생했습니다.', 'error'); return; }
    post.is_notice = newVal;
    const noticeBtn = document.getElementById('d-notice-btn');
    noticeBtn.textContent = newVal ? '📌 공지 해제' : '📌 공지 설정';
    noticeBtn.className = 'btn-notice' + (newVal ? ' on' : '');
    await fetchPosts();
    showToast(newVal ? '공지로 설정되었습니다.' : '공지가 해제되었습니다.', 'success');
  }

  // ── 모달 외부 클릭 닫기 / 엔터 ──
  ['admin-modal','write-modal','detail-modal','edit-modal'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  });
  document.getElementById('admin-pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmAdminLogin();
  });

  // ── 토스트 ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' ' + type : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  fetchPosts();
</script>

<script>
(function(){
  var SB_URL='https://byzulmxcuhsrjdphmuym.supabase.co';
  var SB_KEY='sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs';
  var EP_PERM='ep_closed_';
  var EP_KEY='ep_hide_';
  var _adId=null;
  function shouldShow(id){
    if(localStorage.getItem(EP_PERM+id)==='1')return false;
    var v=localStorage.getItem(EP_KEY+id);
    if(!v)return true;
    return Date.now()>parseInt(v);
  }
  function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  async function loadAd(){
    try{
      var today=new Date().toISOString().slice(0,10);
      var q=SB_URL+'/rest/v1/popup_ads?is_active=eq.true&order=created_at.desc&limit=1'
        +'&or=(start_date.is.null,start_date.lte.'+today+')'
        +'&or=(end_date.is.null,end_date.gte.'+today+')';
      var r=await fetch(q,{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}});
      var data=await r.json();
      if(!data||!data.length)return;
      var ad=data[0];_adId=ad.id;
      if(ad.custom_html){
        document.getElementById('ep-custom-wrap').style.display='block';
        document.getElementById('ep-auto-wrap').style.display='none';
        document.getElementById('ep-custom-content').innerHTML=ad.custom_html;
      } else {
        document.getElementById('ep-custom-wrap').style.display='none';
        document.getElementById('ep-auto-wrap').style.display='contents';
        if(ad.image_url){var img=document.getElementById('ep-coffee-img');img.src=ad.image_url;img.style.display='block';document.getElementById('ep-float-img').src=ad.image_url;}
        var lines=(ad.description||'').split('\n');
        document.getElementById('ep-left-title').innerHTML='<h2>'+esc(ad.title)+'</h2>'+(lines[0]?'<p>'+esc(lines[0])+'</p>':'');
        var body='';
        var rest=lines.slice(1).join('\n').trim();
        if(rest)body+='<div style="font-size:.85rem;color:rgba(255,255,255,.8);line-height:1.7;margin-bottom:16px;white-space:pre-line;">'+esc(rest)+'</div>';
        if(ad.link_url)body+='<a href="'+esc(ad.link_url)+'" target="_blank" rel="noopener" class="ep-btn-cta">자세히 보기 &#x2192;</a>';
        document.getElementById('ep-body-content').innerHTML=body;
      }
      if(ad.image_url)document.getElementById('ep-float-img').src=ad.image_url;
      document.getElementById('ep-float-title').textContent=ad.title;
      var lines2=(ad.description||'').split('\n');
      if(lines2[0])document.getElementById('ep-float-sub').textContent=lines2[0];
      document.getElementById('ep-float').classList.remove('ep-float-hidden');
      if(shouldShow(ad.id))setTimeout(function(){document.getElementById('ep-overlay').classList.add('ep-visible');},1200);
    }catch(e){console.warn('팝업광고 로드 실패',e);}
  }
  window.epShow=function(){document.getElementById('ep-overlay').classList.add('ep-visible');};
  window.epClose=function(){if(_adId)localStorage.setItem(EP_PERM+_adId,'1');document.getElementById('ep-overlay').classList.remove('ep-visible');};
  window.epHideToday=function(){var m=new Date();m.setHours(23,59,59,999);if(_adId)localStorage.setItem(EP_KEY+_adId,m.getTime());document.getElementById('ep-overlay').classList.remove('ep-visible');};
  loadAd();
})();
</script>
