<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>공공기관 채용 경쟁률 — 지텔프IBT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#0A1628;color:#E2E8F0;height:100vh;display:flex;flex-direction:column;}

    /* ── 헤더 ── */
    header{position:sticky;top:0;z-index:50;background:rgba(10,22,40,.95);border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);}
    .hinner{max-width:1200px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .hlogo{font-size:1rem;font-weight:800;color:#60A5FA;text-decoration:none;letter-spacing:-.01em;}
    .hnav{display:none;align-items:center;gap:2px;font-size:.78rem;font-weight:600;}
    .hnav a{color:rgba(255,255,255,.55);text-decoration:none;transition:background .18s,color .18s;padding:5px 10px;border-radius:8px;}
    .hnav a:hover{background:rgba(255,255,255,.07);color:#fff;}
    .hnav a.active{background:rgba(96,165,250,.18);color:#60A5FA;}
    .hbtn{display:none;padding:8px 18px;border-radius:8px;font-size:.8rem;font-weight:700;background:linear-gradient(135deg,#1D4ED8,#2563EB);color:#fff;text-decoration:none;transition:opacity .15s;}
    .hbtn:hover{opacity:.85;}
    .hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:7px;border-radius:8px;}
    .hamburger span{display:block;height:2px;background:#fff;border-radius:2px;transition:transform .25s,opacity .25s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-menu{display:none;flex-direction:column;background:#0D1F3C;border-top:1px solid rgba(255,255,255,.08);padding:12px 16px 16px;}
    .mobile-menu a{padding:12px 4px;font-size:.9rem;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.06);}
    .mobile-menu a:last-child{border-bottom:none;}
    .mobile-menu a:hover{color:#60A5FA;}
    .mobile-menu .mbtn{margin-top:12px;display:block;text-align:center;padding:12px;border-radius:8px;background:linear-gradient(135deg,#1D4ED8,#2563EB);color:#fff;font-weight:700;text-decoration:none;}
    .mobile-menu.open{display:flex;}

    /* ── 레이아웃 ── */
    .layout{display:flex;flex:1;overflow:hidden;}

    /* ── 사이드바 ── */
    aside{width:240px;flex-shrink:0;background:#060F1E;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;}
    .aside-head{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.06);}
    .aside-title{font-size:.65rem;font-weight:800;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
    .search-wrap{position:relative;}
    .search-wrap input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 30px 8px 10px;font-size:.78rem;color:#E2E8F0;outline:none;transition:border-color .2s,background .2s;}
    .search-wrap input::placeholder{color:rgba(255,255,255,.25);}
    .search-wrap input:focus{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.06);}
    .search-ico{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:.7rem;color:rgba(255,255,255,.25);pointer-events:none;}
    .ds-list{flex:1;overflow-y:auto;padding:6px 0;}
    .ds-list::-webkit-scrollbar{width:3px;}
    .ds-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
    .ds-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:background .15s;border-left:2px solid transparent;}
    .ds-item:hover{background:rgba(255,255,255,.04);}
    .ds-item.active{background:rgba(96,165,250,.12);border-left-color:#60A5FA;}
    .ds-name{font-size:.78rem;color:rgba(255,255,255,.6);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;}
    .ds-item:hover .ds-name{color:rgba(255,255,255,.85);}
    .ds-item.active .ds-name{color:#93C5FD;font-weight:700;}
    .ds-cnt{font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:999px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.35);flex-shrink:0;}
    .ds-item.active .ds-cnt{background:rgba(96,165,250,.2);color:#93C5FD;}
    .empty-list{padding:28px 14px;font-size:.78rem;color:rgba(255,255,255,.25);text-align:center;line-height:1.8;}
    /* 순위 배지 */
    .rank-badge{font-size:10px;font-weight:800;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;flex-shrink:0;}
    .rank-1{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;}
    .rank-2{background:linear-gradient(135deg,#94A3B8,#64748B);color:#fff;}
    .rank-3{background:linear-gradient(135deg,#CD7C3A,#92400E);color:#fff;}
    .rank-num{font-size:10px;color:rgba(255,255,255,.2);font-weight:700;min-width:20px;text-align:center;flex-shrink:0;}
    /* 1~3위 아이템 배경 */
    .ds-top1{background:rgba(245,158,11,.1);border-left:2px solid #F59E0B!important;}
    .ds-top1 .ds-name{color:#FCD34D!important;font-weight:700;}
    .ds-top2{background:rgba(148,163,184,.07);border-left:2px solid #94A3B8!important;}
    .ds-top2 .ds-name{color:#CBD5E1!important;font-weight:700;}
    .ds-top3{background:rgba(180,83,9,.09);border-left:2px solid #B45309!important;}
    .ds-top3 .ds-name{color:#FDBA74!important;font-weight:700;}

    /* ── 본문 ── */
    main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .topbar{height:52px;background:#0D1F3C;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;}
    .topbar-title{font-size:.92rem;font-weight:800;color:#E2E8F0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .topbar-cnt{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:999px;background:rgba(96,165,250,.15);color:#93C5FD;white-space:nowrap;border:1px solid rgba(96,165,250,.2);}
    .content-area{flex:1;overflow-y:auto;padding:20px;background:#0A1628;}
    .content-area::-webkit-scrollbar{width:5px;}
    .content-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}

    /* ── 플레이스홀더 ── */
    .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;}
    .ph-ico{font-size:3.5rem;filter:drop-shadow(0 0 24px rgba(96,165,250,.3));}
    .ph-title{font-size:1rem;font-weight:700;color:rgba(255,255,255,.4);}
    .ph-sub{font-size:.8rem;color:rgba(255,255,255,.2);}

    /* ── 섹션 타이틀 ── */
    .sec-title{font-size:.82rem;font-weight:800;color:#CBD5E1;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .sec-title::before{content:'';width:3px;height:14px;background:linear-gradient(180deg,#60A5FA,#818CF8);border-radius:2px;flex-shrink:0;}

    /* ── 요약 카드 ── */
    .sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px;}
    .sum-card{background:#112240;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 14px;position:relative;overflow:hidden;}
    .sum-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.06;background:var(--ac);}
    .sum-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    .sum-val{font-size:1.7rem;font-weight:900;line-height:1;color:var(--ac);}
    .sum-val span{font-size:.9rem;font-weight:600;}
    .sum-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:5px;}
    .ac-blue{--ac:#60A5FA;} .ac-green{--ac:#34D399;} .ac-rose{--ac:#FB7185;} .ac-amber{--ac:#FBBF24;} .ac-purple{--ac:#A78BFA;}

    /* ── 차트 카드 ── */
    .chart-card{background:#112240;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;margin-bottom:22px;}
    .chart-canvas-wrap{position:relative;height:300px;}

    /* ── 퍼널 그리드 ── */
    .funnel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:22px;}
    .funnel-card{background:#112240;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;transition:border-color .2s,transform .2s;}
    .funnel-card:hover{border-color:rgba(96,165,250,.3);transform:translateY(-2px);}
    .fc-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
    .fc-title{font-size:.85rem;font-weight:800;color:#E2E8F0;}
    .grade-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;flex-shrink:0;}
    .grade-6{background:rgba(29,78,216,.4);color:#93C5FD;border:1px solid rgba(96,165,250,.2);}
    .grade-7{background:rgba(6,95,70,.4);color:#6EE7B7;border:1px solid rgba(52,211,153,.2);}
    .grade-b{background:rgba(120,53,15,.4);color:#FDE68A;border:1px solid rgba(251,191,36,.2);}
    .fc-region{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:12px;}
    .fc-ratio{font-size:1.4rem;font-weight:900;margin-bottom:14px;line-height:1;}
    .stage-row{margin-bottom:9px;}
    .stage-row-head{display:flex;justify-content:space-between;margin-bottom:4px;}
    .stage-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);}
    .stage-nums{font-size:10px;color:rgba(255,255,255,.4);}
    .stage-nums strong{color:#CBD5E1;}
    .bar-bg{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);}
    .bar-1{background:linear-gradient(90deg,#2563EB,#60A5FA);}
    .bar-2{background:linear-gradient(90deg,#7C3AED,#A78BFA);}
    .bar-3{background:linear-gradient(90deg,#059669,#34D399);}
    .pass-rate{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);}
    .pr-item{flex:1;text-align:center;background:rgba(255,255,255,.04);border-radius:8px;padding:7px 4px;}
    .pr-val{font-size:.95rem;font-weight:900;color:#60A5FA;}
    .pr-lbl{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;}

    /* ── 데이터 테이블 ── */
    .tbl-card{background:#112240;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;margin-bottom:22px;}
    .tbl-scroll{overflow-x:auto;}
    .data-tbl{width:100%;border-collapse:collapse;font-size:.8rem;}
    .data-tbl thead tr{background:rgba(255,255,255,.04);}
    .data-tbl th{padding:11px 14px;text-align:left;font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.06);}
    .data-tbl th:not(:first-child){text-align:center;}
    .data-tbl td{padding:10px 14px;border-top:1px solid rgba(255,255,255,.04);color:#CBD5E1;vertical-align:middle;}
    .data-tbl td:not(:first-child){text-align:center;}
    .data-tbl tbody tr:hover{background:rgba(255,255,255,.03);}
    .chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;}
    .chip-hot{background:rgba(220,38,38,.25);color:#FCA5A5;border:1px solid rgba(252,165,165,.2);}
    .chip-mid{background:rgba(202,138,4,.2);color:#FDE68A;border:1px solid rgba(253,230,138,.2);}
    .chip-low{background:rgba(22,163,74,.2);color:#86EFAC;border:1px solid rgba(134,239,172,.2);}

    /* ── 모바일 ── */
    .sidebar-toggle{display:none;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);padding:6px 12px;border-radius:8px;cursor:pointer;}
    @media(max-width:640px){
      aside{width:220px;}
      .content-area{padding:12px;}
      .sum-val{font-size:1.4rem;}
    }
    @media(max-width:480px){
      aside{position:fixed;left:-220px;top:64px;height:calc(100vh - 64px);z-index:40;transition:left .25s;}
      aside.open{left:0;box-shadow:8px 0 32px rgba(0,0,0,.5);}
      main{width:100%;}
      .sidebar-toggle{display:flex!important;}
    }
  </style>
</head>

<script>
const { createClient } = supabase;
const db = createClient(
  'https://byzulmxcuhsrjdphmuym.supabase.co',
  'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs'
);

let _allDatasets = [];
let _chartInst = null;

function toggleMenu() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobile-menu').classList.toggle('open');
}

async function init() {
  const [jobsRes, viewsRes] = await Promise.all([
    db.from('alio_jobs')
      .select('dataset_name,grade,grade_key,job,region,s1_pass,s1_total,s2_pass,s2_total,s3_pass,s3_total,ratio')
      .order('dataset_name'),
    db.from('page_views')
      .select('page')
      .like('page', 'competition-click:%')
  ]);
  if (jobsRes.error || !jobsRes.data) {
    document.getElementById('ds-list').innerHTML = '<div class="empty-list">데이터를 불러올 수 없습니다</div>';
    return;
  }
  // 클릭 수 집계
  const viewCounts = {};
  (viewsRes.data || []).forEach(r => {
    const name = r.page.slice('competition-click:'.length);
    viewCounts[name] = (viewCounts[name] || 0) + 1;
  });
  const dsMap = {};
  jobsRes.data.forEach(r => {
    const k = r.dataset_name || '미분류';
    if (!dsMap[k]) dsMap[k] = [];
    dsMap[k].push(r);
  });
  _allDatasets = Object.entries(dsMap).map(([name, rows]) => ({
    name, rows, count: rows.length, views: viewCounts[name] || 0
  }));
  // 조회수 많은 순 정렬
  _allDatasets.sort((a, b) => b.views - a.views);
  // 전체 순위 부여
  _allDatasets.forEach((ds, i) => { ds.rank = i + 1; });
  renderDatasetList(_allDatasets);
}

function renderDatasetList(list) {
  const el = document.getElementById('ds-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-list">등록된 채용공고가 없습니다<br><small style="opacity:.6;">관리자 페이지에서<br>데이터를 추가하세요</small></div>';
    return;
  }
  el.innerHTML = list.map(ds => {
    const r = ds.rank;
    const topCls = r === 1 ? ' ds-top1' : r === 2 ? ' ds-top2' : r === 3 ? ' ds-top3' : '';
    const rankHtml = r <= 3
      ? `<span class="rank-badge rank-${r}">${r}</span>`
      : `<span class="rank-num">${r}</span>`;
    return `
    <div class="ds-item${topCls}" onclick="selectDataset('${ds.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      ${rankHtml}
      <span class="ds-name" title="${ds.name}">${ds.name}</span>
      <span class="ds-cnt">${ds.count}</span>
    </div>`;
  }).join('');
}

function filterDatasets(q) {
  renderDatasetList(q ? _allDatasets.filter(d => d.name.includes(q)) : _allDatasets);
}

function selectDataset(name) {
  document.querySelectorAll('.ds-item').forEach(el =>
    el.classList.toggle('active', el.querySelector('.ds-name')?.title === name));
  const ds = _allDatasets.find(d => d.name === name);
  if (!ds) return;
  document.getElementById('topbar-title').textContent = ds.name;
  const c = document.getElementById('topbar-cnt');
  c.textContent = `직종 ${ds.count}개`; c.classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('open');
  renderVisualization(ds.name, ds.rows);
  // 클릭 트래킹
  if (localStorage.getItem('gtelp_notrack') !== '1') {
    fetch('https://byzulmxcuhsrjdphmuym.supabase.co/rest/v1/page_views', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': 'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs',
        'Authorization': 'Bearer sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ page: 'competition-click:' + name, referrer: document.referrer || null })
    }).catch(function(){});
  }
}

function renderVisualization(dsName, rows) {
  const area = document.getElementById('content-area');
  const totalHired = rows.reduce((s,r) => s+(r.s3_pass||0), 0);
  const totalApply = rows.reduce((s,r) => s+(r.s1_total||0), 0);
  const ratios = rows.map(r => parseFloat(r.ratio)||0);
  const maxR = Math.max(...ratios), minR = Math.min(...ratios.filter(v=>v>0));
  const maxRow = rows.find(r => parseFloat(r.ratio)===maxR);
  const minRow = rows.find(r => parseFloat(r.ratio)===minR);
  const avgR = rows.length ? (ratios.reduce((s,v)=>s+v,0)/rows.length).toFixed(1) : 0;

  area.innerHTML = `
    <div class="sum-grid">
      <div class="sum-card ac-blue"><div class="sum-label">총 채용인원</div><div class="sum-val">${totalHired}<span>명</span></div><div class="sum-sub">최종 합격자 합계</div></div>
      <div class="sum-card ac-green"><div class="sum-label">전체 지원자</div><div class="sum-val">${totalApply.toLocaleString()}<span>명</span></div><div class="sum-sub">1차 응시 합계</div></div>
      <div class="sum-card ac-rose"><div class="sum-label">최고 경쟁률</div><div class="sum-val">${maxR}<span>:1</span></div><div class="sum-sub">${maxRow?maxRow.job+'('+maxRow.region+')':''}</div></div>
      <div class="sum-card ac-amber"><div class="sum-label">최저 경쟁률</div><div class="sum-val">${minR}<span>:1</span></div><div class="sum-sub">${minRow?minRow.job+'('+minRow.region+')':''}</div></div>
      <div class="sum-card ac-purple"><div class="sum-label">직종 수</div><div class="sum-val">${rows.length}<span>개</span></div><div class="sum-sub">평균 ${avgR}:1</div></div>
    </div>

    <div class="sec-title">직종별 경쟁률</div>
    <div class="chart-card">
      <div class="chart-canvas-wrap"><canvas id="ratioChart"></canvas></div>
    </div>

    <div class="sec-title">직종별 전형 단계 현황</div>
    <div class="funnel-grid" id="funnelGrid"></div>

    <div class="sec-title">전체 상세 데이터</div>
    <div class="tbl-card">
      <div class="tbl-scroll">
        <table class="data-tbl">
          <thead><tr>
            <th>직급 / 직종</th>
            <th>1차 합격 / 응시</th>
            <th>2차 합격 / 응시</th>
            <th>최종 합격 / 응시</th>
            <th>경쟁률</th>
          </tr></thead>
          <tbody id="dataTableBody"></tbody>
        </table>
      </div>
    </div>`;

  // 차트
  if (_chartInst) { _chartInst.destroy(); _chartInst = null; }
  const sorted = [...rows].sort((a,b) => (parseFloat(b.ratio)||0)-(parseFloat(a.ratio)||0));
  const lbls  = sorted.map(d => `${d.job}(${d.region||''})`);
  const vals  = sorted.map(d => parseFloat(d.ratio)||0);
  const clrs  = vals.map(r => r>=80?'rgba(251,113,133,.85)':r>=30?'rgba(251,191,36,.85)':'rgba(52,211,153,.85)');
  _chartInst = new Chart(document.getElementById('ratioChart'), {
    type:'bar',
    data:{ labels:lbls, datasets:[{ label:'경쟁률', data:vals, backgroundColor:clrs, borderRadius:6, borderSkipped:false }] },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(10,22,40,.95)',
          borderColor:'rgba(96,165,250,.3)',
          borderWidth:1,
          titleColor:'#93C5FD',
          bodyColor:'#E2E8F0',
          callbacks:{ label: ctx => `  경쟁률 ${ctx.parsed.x}:1` }
        }
      },
      scales:{
        x:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'rgba(255,255,255,.4)', callback:v=>v+':1'}, border:{color:'rgba(255,255,255,.08)'} },
        y:{ grid:{display:false}, ticks:{color:'#CBD5E1',font:{size:11}}, border:{color:'rgba(255,255,255,.08)'} }
      }
    }
  });

  // 퍼널 카드
  const grid = document.getElementById('funnelGrid');
  const pct = (p,t) => t ? Math.round(p/t*100) : 0;
  rows.forEach(d => {
    const rv = parseFloat(d.ratio)||0;
    const ratioClr = rv>=80?'#FB7185':rv>=30?'#FBBF24':'#34D399';
    const maxT = d.s1_total||1;
    const r2pct = d.s2_total ? pct(d.s2_pass,maxT) : null;
    const pr1=pct(d.s1_pass,d.s1_total), pr2=d.s2_total?pct(d.s2_pass,d.s2_total):null, pr3=pct(d.s3_pass,d.s3_total);
    const s2html = d.s2_total
      ? `<div class="stage-row"><div class="stage-row-head"><span class="stage-lbl">2차 전형</span><span class="stage-nums"><strong>${d.s2_pass||0}명</strong> / ${d.s2_total}명 응시</span></div><div class="bar-bg"><div class="bar-fill bar-2" style="width:${r2pct}%"></div></div></div>`
      : `<div class="stage-row"><div class="stage-row-head"><span class="stage-lbl">2차 전형</span><span class="stage-nums" style="opacity:.3;">해당없음</span></div></div>`;
    grid.insertAdjacentHTML('beforeend', `
      <div class="funnel-card">
        <div class="fc-head"><span class="fc-title">${d.job}</span></div>
        <div class="fc-region">${d.region||''} &middot; 최종채용 ${d.s3_pass||0}명</div>
        <div class="fc-ratio" style="color:${ratioClr};">${d.ratio}<span style="font-size:.9rem;font-weight:600;">:1</span></div>
        <div class="stage-row"><div class="stage-row-head"><span class="stage-lbl">1차 전형</span><span class="stage-nums"><strong>${d.s1_pass||0}명</strong> / ${d.s1_total||0}명 응시</span></div><div class="bar-bg"><div class="bar-fill bar-1" style="width:100%"></div></div></div>
        ${s2html}
        <div class="stage-row"><div class="stage-row-head"><span class="stage-lbl">최종 합격</span><span class="stage-nums"><strong>${d.s3_pass||0}명</strong> / ${d.s3_total||0}명 응시</span></div><div class="bar-bg"><div class="bar-fill bar-3" style="width:${pct(d.s3_pass,maxT)}%"></div></div></div>
        <div class="pass-rate">
          <div class="pr-item"><div class="pr-val">${pr1}%</div><div class="pr-lbl">1차 합격률</div></div>
          ${pr2!==null?`<div class="pr-item"><div class="pr-val">${pr2}%</div><div class="pr-lbl">2차 합격률</div></div>`:''}
          <div class="pr-item"><div class="pr-val" style="color:#34D399;">${pr3}%</div><div class="pr-lbl">최종 합격률</div></div>
        </div>
      </div>`);
  });

  // 데이터 테이블
  const tbody = document.getElementById('dataTableBody');
  rows.forEach(d => {
    const rv = parseFloat(d.ratio)||0;
    const chipCls = rv>=80?'chip-hot':rv>=20?'chip-mid':'chip-low';
    const s2 = d.s2_total
      ? `<span style="color:#93C5FD;font-weight:700;">${d.s2_pass}</span><span style="color:rgba(255,255,255,.3);">/${d.s2_total}</span>`
      : '<span style="color:rgba(255,255,255,.2);">—</span>';
    tbody.insertAdjacentHTML('beforeend', `<tr>
      <td>
        <strong style="color:#E2E8F0;">${d.job}</strong>
        <span style="font-size:11px;color:rgba(255,255,255,.3);margin-left:4px;">(${d.region||''})</span>
      </td>
      <td><span style="color:#60A5FA;font-weight:700;">${d.s1_pass||0}</span><span style="color:rgba(255,255,255,.3);">/${d.s1_total||0}</span></td>
      <td>${s2}</td>
      <td><span style="color:#34D399;font-weight:700;">${d.s3_pass||0}</span><span style="color:rgba(255,255,255,.3);">/${d.s3_total||0}</span></td>
      <td><span class="chip ${chipCls}">${d.ratio}:1</span></td>
    </tr>`);
  });
}

init();
</script>
