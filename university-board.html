<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>대학교 활동 게시판</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#F1F5F9;color:#1E293B;height:100vh;display:flex;flex-direction:column;}

    /* ── 헤더 ── */
    header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #E2E8F0;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .hinner{max-width:1200px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .hlogo{font-size:1rem;font-weight:800;color:#1E4D8C;text-decoration:none;}
    .hnav{display:flex;align-items:center;gap:4px;font-size:0.78rem;font-weight:600;}
    .hnav a{color:#475569;text-decoration:none;transition:background .18s,color .18s;padding:5px 9px;border-radius:8px;}
    .hnav a:hover,.hnav a.active{background:#1E4D8C;color:#fff;}
    .hbtn{padding:8px 18px;border-radius:8px;font-size:0.8rem;font-weight:700;background:#1E4D8C;color:#fff;text-decoration:none;transition:background .15s;}
    .hbtn:hover{background:#163870;}
    .hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:#1E4D8C;border:none;padding:6px;border-radius:8px;}
    .hamburger span{display:block;height:2px;background:#fff;border-radius:2px;transition:transform .25s,opacity .25s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .mobile-menu{display:none;flex-direction:column;background:#fff;border-top:1px solid #E2E8F0;padding:12px 16px 16px;}
    .mobile-menu a{padding:12px 4px;font-size:0.9rem;font-weight:600;color:#1E293B;text-decoration:none;border-bottom:1px solid #F1F5F9;}
    .mobile-menu a:last-child{border-bottom:none;}
    .mobile-menu .mbtn{margin-top:12px;display:block;text-align:center;padding:12px;border-radius:8px;background:#1E4D8C;color:#fff;font-weight:700;text-decoration:none;}
    .mobile-menu.open{display:flex;}
    @media(max-width:640px){.hnav{display:none;}.hbtn{display:none;}.hamburger{display:flex;}}

    /* ── 레이아웃 ── */
    .layout{display:flex;flex:1;overflow:hidden;}

    /* ── 사이드바 ── */
    aside{width:240px;flex-shrink:0;background:#0D1F3C;display:flex;flex-direction:column;overflow:hidden;}
    .aside-head{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07);}
    .aside-head h2{font-size:.78rem;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
    .search-wrap{position:relative;}
    .search-wrap input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:7px 30px 7px 10px;font-size:.78rem;color:#fff;outline:none;transition:border-color .2s;}
    .search-wrap input::placeholder{color:rgba(255,255,255,.3);}
    .search-wrap input:focus{border-color:rgba(255,255,255,.35);}
    .search-wrap .ico{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:.7rem;color:rgba(255,255,255,.3);pointer-events:none;}
    .school-list{flex:1;overflow-y:auto;padding:8px 0;}
    .school-list::-webkit-scrollbar{width:4px;}
    .school-list::-webkit-scrollbar-track{background:transparent;}
    .school-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}
    .school-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;transition:background .15s;border-radius:0;gap:8px;}
    .school-item:hover{background:rgba(255,255,255,.07);}
    .school-item.active{background:linear-gradient(90deg,rgba(79,126,247,.35),rgba(79,126,247,.1));border-left:3px solid #4F7EF7;}
    .school-item.active .school-name{color:#fff;font-weight:700;}
    .school-name{font-size:.8rem;color:rgba(255,255,255,.7);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .school-cnt{font-size:.65rem;font-weight:700;padding:1px 7px;border-radius:999px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);flex-shrink:0;}
    .school-item.active .school-cnt{background:rgba(79,126,247,.3);color:#93C5FD;}
    .empty-list{padding:24px 14px;font-size:.78rem;color:rgba(255,255,255,.3);text-align:center;}

    /* ── 본문 ── */
    main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

    /* 상단 바 */
    .topbar{height:52px;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05);}
    .topbar-school{font-size:1rem;font-weight:800;color:#0D1F3C;}
    .topbar-cnt{font-size:.75rem;font-weight:700;padding:2px 10px;border-radius:999px;background:#EFF6FF;color:#1E4D8C;}
    .topbar-hint{font-size:.78rem;color:#94A3B8;margin-left:auto;}

    /* 게시판 */
    .board-wrap{flex:1;overflow-y:auto;padding:20px 24px;}
    .board-wrap::-webkit-scrollbar{width:6px;}
    .board-wrap::-webkit-scrollbar-track{background:transparent;}
    .board-wrap::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}

    /* 플레이스홀더 */
    .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#94A3B8;}
    .placeholder .ico{font-size:3rem;opacity:.4;}
    .placeholder p{font-size:.9rem;font-weight:600;}
    .placeholder small{font-size:.78rem;opacity:.7;}

    /* 게시글 테이블 */
    .post-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .post-table thead tr{background:#F8FAFF;border-bottom:1.5px solid #E2E8F0;}
    .post-table th{padding:11px 16px;text-align:left;font-size:.72rem;font-weight:700;color:#64748B;white-space:nowrap;}
    .post-table tbody tr{border-bottom:1px solid #F1F5F9;transition:background .15s;cursor:pointer;}
    .post-table tbody tr:last-child{border-bottom:none;}
    .post-table tbody tr:hover{background:#F8FAFF;}
    .post-table td{padding:13px 16px;font-size:.82rem;color:#334155;}
    .post-table td.title-cell{font-weight:600;color:#1E293B;max-width:420px;}
    .post-table td.title-cell a{color:inherit;text-decoration:none;}
    .post-table td.title-cell a:hover{color:#1E4D8C;text-decoration:underline;}
    .post-num{font-size:.72rem;color:#94A3B8;width:40px;}
    .post-date{font-size:.72rem;color:#94A3B8;white-space:nowrap;}
    .post-link-ico{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:#EFF6FF;color:#1E4D8C;font-size:.65rem;flex-shrink:0;}

    /* 로고 썸네일 */
    .school-logo{width:28px;height:28px;object-fit:contain;border-radius:4px;flex-shrink:0;}

    /* 카드형 그리드 (토글 가능) */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
    .post-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:18px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:box-shadow .2s,transform .2s;cursor:pointer;}
    .post-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px);}
    .post-card-title{font-size:.88rem;font-weight:700;color:#1E293B;line-height:1.45;}
    .post-card-date{font-size:.72rem;color:#94A3B8;margin-top:auto;}
    .post-card-link{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:700;color:#1E4D8C;text-decoration:none;margin-top:4px;}
    .post-card-link:hover{text-decoration:underline;}

    /* 뷰 토글 */
    .view-toggle{display:flex;gap:4px;}
    .vbtn{width:28px;height:28px;border-radius:6px;border:1.5px solid #E2E8F0;background:#fff;color:#94A3B8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:background .15s,color .15s;}
    .vbtn.active{background:#0D1F3C;color:#fff;border-color:#0D1F3C;}

    /* 반응형 */
    @media(max-width:640px){
      aside{width:200px;}
      .topbar{padding:0 14px;}
      .board-wrap{padding:14px;}
    }
    @media(max-width:480px){
      .layout{flex-direction:column;}
      aside{width:100%;height:180px;}
      .school-list{flex-direction:row;display:flex;flex-wrap:nowrap;overflow-x:auto;padding:8px;}
      .school-item{flex-shrink:0;border-radius:8px;}
    }

    /* 애니메이션 */
    @keyframes rowIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .row-anim{animation:rowIn .25s ease both;}
  </style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="hinner">
    <a href="index.html" class="hlogo">지텔프IBT 대학컨설팅</a>
    <nav class="hnav">
      <a href="index.html#about">서비스 소개</a>
      <a href="package.html">패키지</a>
      <a href="schedule.html">정기시험 일정</a>
      <a href="university-board.html" class="active">대학활동</a>
      <a href="library-pdf.html">채용공고 자료실</a>
      <a href="job-board.html">게시판</a>
      <a href="index.html#faq">FAQ</a>
      <a href="gtelp-score.html">점수대비표</a>
    </nav>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="index.html#consultation-form" class="hbtn">대학IBT무료신청</a>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html#about">서비스 소개</a>
    <a href="package.html">패키지</a>
    <a href="schedule.html">정기시험 일정</a>
    <a href="university-board.html">대학활동</a>
    <a href="library-pdf.html">채용공고 자료실</a>
    <a href="job-board.html">게시판</a>
    <a href="index.html#faq">FAQ</a>
    <a href="gtelp-score.html">점수대비표</a>
    <a href="index.html#consultation-form" class="mbtn">대학IBT무료신청</a>
  </div>
</header>

<div class="layout">

  <!-- 사이드바 -->
  <aside>
    <div class="aside-head">
      <h2>대학교 목록</h2>
      <div class="search-wrap">
        <input id="school-search" type="text" placeholder="대학명 검색..." oninput="filterSchools(this.value)"/>
        <span class="ico">🔍</span>
      </div>
    </div>
    <div class="school-list" id="school-list">
      <div class="empty-list">불러오는 중...</div>
    </div>
  </aside>

  <!-- 본문 -->
  <main>
    <div class="topbar" id="topbar">
      <span class="topbar-school" id="topbar-school">대학교를 선택하세요</span>
      <span class="topbar-cnt" id="topbar-cnt" style="display:none;"></span>
      <span class="topbar-hint" id="topbar-hint">← 왼쪽에서 대학교를 선택하세요</span>
      <div class="view-toggle" id="view-toggle" style="display:none;">
        <button class="vbtn" id="vbtn-table" onclick="setView('table')" title="목록형">☰</button>
        <button class="vbtn active" id="vbtn-card" onclick="setView('card')" title="카드형">⊞</button>
      </div>
    </div>
    <div class="board-wrap" id="board-wrap">
      <div class="placeholder">
        <div class="ico">🏫</div>
        <p>대학교를 선택해주세요</p>
        <small>왼쪽 목록에서 대학교를 클릭하면<br>해당 대학의 소식이 표시됩니다</small>
      </div>
    </div>
  </main>

</div>

<script>
  function toggleMenu() {
    document.getElementById('mobile-menu').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('open');
  }

  const SB_URL = 'https://byzulmxcuhsrjdphmuym.supabase.co';
  const SB_KEY = 'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs';

  let allData = [];
  let schoolMap = {};
  let selectedSchool = null;
  let currentView = 'card';

  function esc(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
  function fmtDate(d){ if(!d) return '-'; const dt=new Date(d); return dt.getFullYear()+'.'+(dt.getMonth()+1).toString().padStart(2,'0')+'.'+dt.getDate().toString().padStart(2,'0'); }

  // ── 데이터 로드 (대학활동 + 대학소식 + 직원채용공고 병렬) ──
  async function loadData() {
    try {
      const headers = { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY };
      const [r1, r2, r3] = await Promise.all([
        fetch(SB_URL+'/rest/v1/school_programs?select=*&order=sort_order.asc,created_at.desc', { headers }),
        fetch(SB_URL+'/rest/v1/university_news?select=*&order=sort_order.asc,created_at.desc', { headers }),
        fetch(SB_URL+'/rest/v1/staff_job_postings?select=*&order=sort_order.asc,created_at.desc', { headers })
      ]);
      const [programs, news, staffJobs] = await Promise.all([r1.json(), r2.json(), r3.json()]);

      const prog = Array.isArray(programs)  ? programs.map(r => ({ ...r, _type:'활동' })) : [];
      const nws  = Array.isArray(news)      ? news.map(r => ({ ...r, _type:'소식' })) : [];

      // 대학활동+대학소식으로 schoolMap 먼저 구성
      schoolMap = {};
      [...prog, ...nws].forEach(r => {
        const s = r.school_name || '기타';
        if (!schoolMap[s]) schoolMap[s] = [];
        schoolMap[s].push(r);
      });

      // 직원채용공고는 department(학교명)가 기존 학교와 일치할 때만 추가
      if (Array.isArray(staffJobs)) {
        staffJobs.forEach(r => {
          const s = r.department;
          if (s && schoolMap[s]) {
            schoolMap[s].push({ ...r, school_name: s, _type:'채용' });
          }
        });
      }

      allData = Object.values(schoolMap).flat();

      renderSchoolList(Object.keys(schoolMap));
    } catch(e) {
      console.error(e);
      document.getElementById('school-list').innerHTML = '<div class="empty-list">로드 실패</div>';
    }
  }

  // ── 사이드바 렌더링 ──
  function renderSchoolList(schools) {
    const el = document.getElementById('school-list');
    if (schools.length === 0) {
      el.innerHTML = '<div class="empty-list">검색 결과가 없습니다</div>';
      return;
    }
    el.innerHTML = schools.map(s => {
      const cnt = schoolMap[s] ? schoolMap[s].length : 0;
      const isActive = selectedSchool === s;
      return `<div class="school-item${isActive?' active':''}" onclick="selectSchool('${esc(s).replace(/'/g,"\\'")}')">
        <span class="school-name">${esc(s)}</span>
        <span class="school-cnt">${cnt}</span>
      </div>`;
    }).join('');
  }

  // ── 대학 검색 필터 ──
  function filterSchools(q) {
    const filtered = Object.keys(schoolMap).filter(s =>
      s.toLowerCase().includes(q.toLowerCase())
    );
    renderSchoolList(filtered);
  }

  // ── 대학 선택 ──
  function selectSchool(name) {
    selectedSchool = name;
    const posts = schoolMap[name] || [];

    // 사이드바 active 업데이트
    renderSchoolList(Object.keys(schoolMap).filter(s =>
      s.toLowerCase().includes(document.getElementById('school-search').value.toLowerCase())
    ));

    // 상단바
    document.getElementById('topbar-school').textContent = name;
    const cntEl = document.getElementById('topbar-cnt');
    cntEl.textContent = posts.length + '건';
    cntEl.style.display = 'inline-flex';
    document.getElementById('topbar-hint').style.display = 'none';
    document.getElementById('view-toggle').style.display = 'flex';

    renderPosts(posts);
  }

  // ── 게시글 렌더링 ──
  function renderPosts(posts) {
    const wrap = document.getElementById('board-wrap');
    if (posts.length === 0) {
      wrap.innerHTML = '<div class="placeholder"><div class="ico">📭</div><p>등록된 소식이 없습니다</p></div>';
      return;
    }
    const typeBadge = (type) => {
      if (type === '활동') return `<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;background:#EFF6FF;color:#1E4D8C;margin-right:6px;">활동</span>`;
      if (type === '소식') return `<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;background:#F0FDF4;color:#16A34A;margin-right:6px;">소식</span>`;
      return `<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;background:#FFF7ED;color:#C2410C;margin-right:6px;">채용</span>`;
    };

    if (currentView === 'table') {
      wrap.innerHTML = `
        <table class="post-table">
          <thead>
            <tr>
              <th class="post-num">번호</th>
              <th>구분</th>
              <th>제목</th>
              <th>링크</th>
              <th class="post-date">등록일</th>
            </tr>
          </thead>
          <tbody>
            ${posts.map((r, i) => `
              <tr class="row-anim" style="animation-delay:${(i*0.04).toFixed(2)}s">
                <td class="post-num">${posts.length - i}</td>
                <td>${typeBadge(r._type)}</td>
                <td class="title-cell">${r.link
                  ? `<a href="${esc(r.link)}" target="_blank" title="${esc(r.title)}">${esc(r.title&&r.title.length>15?r.title.slice(0,15)+'...':r.title)}</a>`
                  : esc(r.title&&r.title.length>15?r.title.slice(0,15)+'...':r.title)}</td>
                <td>${r.link ? `<a href="${esc(r.link)}" target="_blank" class="post-link-ico" title="바로가기">↗</a>` : '-'}</td>
                <td class="post-date">${fmtDate(r.created_at)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } else {
      wrap.innerHTML = `<div class="card-grid">
        ${posts.map((r, i) => `
          <div class="post-card row-anim" style="animation-delay:${(i*0.05).toFixed(2)}s" ${r.link?`onclick="window.open('${esc(r.link)}','_blank')"`:''}>
            <div style="margin-bottom:6px;">${typeBadge(r._type)}</div>
            <div class="post-card-title" title="${esc(r.title)}">${esc(r.title&&r.title.length>15?r.title.slice(0,15)+'...':r.title)}</div>
            ${r.link ? `<a href="${esc(r.link)}" target="_blank" class="post-card-link" onclick="event.stopPropagation()">바로가기 ↗</a>` : ''}
            <div class="post-card-date">${fmtDate(r.created_at)}</div>
          </div>`).join('')}
      </div>`;
    }
  }

  // ── 뷰 전환 ──
  function setView(v) {
    currentView = v;
    document.getElementById('vbtn-table').classList.toggle('active', v==='table');
    document.getElementById('vbtn-card').classList.toggle('active', v==='card');
    if (selectedSchool) renderPosts(schoolMap[selectedSchool] || []);
  }

  loadData();
</script>
</body>
</html>
