<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>직종별 채용 경쟁률 분석</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#0A1628;color:#E2E8F0;min-height:100vh;}

    header{background:rgba(10,22,40,.97);border-bottom:1px solid rgba(255,255,255,.08);padding:0 24px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
    header h1{font-size:1.05rem;font-weight:800;color:#60A5FA;}
    header .meta{font-size:.75rem;color:rgba(255,255,255,.3);margin-left:auto;}

    .wrap{max-width:1280px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:20px;}

    /* 요약 카드 */
    .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
    .scard{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;text-align:center;}
    .scard .val{font-size:1.6rem;font-weight:800;color:#60A5FA;}
    .scard .lbl{font-size:.7rem;color:rgba(255,255,255,.35);margin-top:3px;}

    /* ① 그래프 */
    .section{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;}
    .sec-title{font-size:.88rem;font-weight:700;color:#93C5FD;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .sec-title small{font-weight:400;color:rgba(255,255,255,.3);font-size:.72rem;}
    .chart-wrap{position:relative;height:380px;}

    /* ② 검색 */
    .search-section{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;}
    .search-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

    /* 전체검색 */
    .search-left{display:flex;flex-direction:column;gap:10px;}
    .search-left .desc{font-size:.75rem;color:rgba(255,255,255,.4);}
    .btn-all{padding:12px 0;border-radius:10px;font-size:.88rem;font-weight:700;background:linear-gradient(135deg,#1D4ED8,#3B82F6);color:#fff;border:none;cursor:pointer;width:100%;transition:opacity .15s;}
    .btn-all:hover{opacity:.85;}

    /* 관련검색어 */
    .search-right{display:flex;flex-direction:column;gap:8px;position:relative;}
    .search-right .desc{font-size:.75rem;color:rgba(255,255,255,.4);}
    .search-input-wrap{position:relative;}
    .search-input-wrap input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#E2E8F0;padding:10px 36px 10px 14px;font-size:.85rem;outline:none;transition:border-color .15s;}
    .search-input-wrap input:focus{border-color:#3B82F6;background:rgba(59,130,246,.06);}
    .search-input-wrap input::placeholder{color:rgba(255,255,255,.25);}
    .search-input-wrap .ico{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:.9rem;pointer-events:none;}

    /* 자동완성 드롭다운 */
    .autocomplete{position:absolute;top:100%;left:0;right:0;background:#0D2547;border:1px solid rgba(96,165,250,.3);border-radius:10px;margin-top:4px;max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .ac-item{padding:9px 14px;font-size:.78rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);color:#CBD5E1;display:flex;justify-content:space-between;align-items:center;}
    .ac-item:last-child{border-bottom:none;}
    .ac-item:hover,.ac-item.selected{background:rgba(59,130,246,.15);color:#93C5FD;}
    .ac-item .ac-count{font-size:.68rem;color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);padding:2px 7px;border-radius:10px;}
    .ac-item .ac-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
    .ac-empty{padding:14px;font-size:.78rem;color:rgba(255,255,255,.3);text-align:center;}
    .cb-box{width:16px;height:16px;border:2px solid rgba(96,165,250,.6);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;font-size:.7rem;color:#60A5FA;transition:all .15s;}
    .cb-box.checked{background:#3B82F6;border-color:#3B82F6;color:#fff;}

    /* 직종 태그 */
    .job-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
    .job-tag{padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);transition:all .15s;}
    .job-tag:hover{background:rgba(96,165,250,.12);border-color:#60A5FA;color:#93C5FD;}
    .job-tag.active{background:rgba(96,165,250,.22);border-color:#60A5FA;color:#60A5FA;}
    .job-tag.all-tag{border-color:rgba(52,211,153,.4);color:#34D399;}
    .job-tag.all-tag.active{background:rgba(52,211,153,.18);}

    /* ③ 결과 테이블 */
    .result-section{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;}
    .result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
    .result-title{font-size:.88rem;font-weight:700;color:#93C5FD;}
    .result-count{font-size:.72rem;color:rgba(255,255,255,.3);}
    .result-sort{font-size:.72rem;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:6px;}
    .result-sort select{background:#0A1628;border:1px solid rgba(255,255,255,.1);color:#E2E8F0;border-radius:6px;padding:4px 8px;font-size:.72rem;outline:none;}

    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:.77rem;}
    th{background:#0A1628;color:rgba(255,255,255,.45);font-weight:600;padding:9px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap;cursor:pointer;user-select:none;}
    th:hover{color:#93C5FD;}
    th.sorted{color:#60A5FA;}
    td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:#CBD5E1;white-space:nowrap;}
    tr:hover td{background:rgba(255,255,255,.025);}
    td.num{text-align:right;font-variant-numeric:tabular-nums;}
    .ds-name{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#93C5FD;font-weight:600;}
    .job-name{color:#E2E8F0;font-weight:600;}
    .chip{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.7rem;font-weight:700;}
    .chip-hot{background:rgba(251,113,133,.15);color:#FB7185;border:1px solid rgba(251,113,133,.3);}
    .chip-mid{background:rgba(251,191,36,.12);color:#FBBF24;border:1px solid rgba(251,191,36,.25);}
    .chip-low{background:rgba(52,211,153,.1);color:#34D399;border:1px solid rgba(52,211,153,.2);}
    .dash{color:rgba(255,255,255,.18);}

    .placeholder-msg{text-align:center;padding:50px 20px;color:rgba(255,255,255,.25);font-size:.85rem;line-height:1.8;}
    .placeholder-msg .ico{font-size:2rem;display:block;margin-bottom:10px;}

    @media(max-width:768px){
      .summary{grid-template-columns:repeat(3,1fr);}
      .search-row{grid-template-columns:1fr;}
      .chart-wrap{height:260px;}
      .ds-name{max-width:130px;}
    }
  </style>
</head>
<body>

<header>
  <h1>📊 직종별 채용 경쟁률 분석</h1>
  <span class="meta" id="meta-txt">불러오는 중…</span>
</header>

<div class="wrap">

  <!-- 요약 -->
  <div class="summary">
    <div class="scard"><div class="val" id="s-total">—</div><div class="lbl">전체 레코드</div></div>
    <div class="scard"><div class="val" id="s-ds">—</div><div class="lbl">공고 수</div></div>
    <div class="scard"><div class="val" id="s-jobs">—</div><div class="lbl">직종 수</div></div>
    <div class="scard"><div class="val" id="s-avg">—</div><div class="lbl">평균 경쟁률</div></div>
    <div class="scard"><div class="val" id="s-max">—</div><div class="lbl">최고 경쟁률</div></div>
  </div>

  <!-- ① 그래프 -->
  <div class="section">
    <div class="sec-title">직종별 평균 경쟁률 <small>막대 클릭 → 해당 직종 필터</small></div>
    <div class="chart-wrap"><canvas id="jobChart"></canvas></div>
  </div>

  <!-- ② 결과 -->
  <div class="result-section" id="result-section">
    <div class="result-header">
      <div>
        <div class="result-title" id="result-title">검색 결과</div>
        <div class="result-count" id="result-count"></div>
      </div>
      <div class="result-sort">
        정렬:
        <select id="sort-select" onchange="renderTable()">
          <option value="ratio_desc">경쟁률 높은순</option>
          <option value="ratio_asc">경쟁률 낮은순</option>
          <option value="name_asc">공고명 가나다순</option>
          <option value="s1_total_desc">1차응시 많은순</option>
          <option value="job_asc">직종명순</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>공고명</th>
            <th>직종</th>
            <th>지역</th>
            <th>직급</th>
            <th class="num">1차응시</th>
            <th class="num">1차합격</th>
            <th class="num">2차</th>
            <th class="num">3차</th>
            <th class="num">최종합격</th>
            <th class="num">경쟁률</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="10" class="placeholder-msg">
            <span class="ico">🔎</span>
            전체검색하기를 누르거나 공고명을 검색하세요
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ③ 검색 -->
  <div class="search-section">
    <div class="sec-title" style="margin-bottom:16px;">검색</div>
    <div class="search-row">

      <!-- 좌: 전체 검색 -->
      <div class="search-left">
        <div class="desc">전체 공고를 가나다순으로 표시합니다</div>
        <button class="btn-all" onclick="showAll()">📋 전체검색하기</button>
        <div class="desc" style="margin-top:4px;">직종별 필터</div>
        <div class="job-tags" id="jobTags"></div>
      </div>

      <!-- 우: 직종 검색어 -->
      <div class="search-right">
        <div class="desc">직종명으로 검색하여 선택하세요</div>
        <div class="search-input-wrap">
          <input type="text" id="search-input" placeholder="직종 검색… (예: 전기, 기계, 사무)"
            oninput="onSearchInput()" onkeydown="onSearchKeydown(event)" autocomplete="off"/>
          <span class="ico">🔍</span>
          <div class="autocomplete" id="ac-list" style="display:none;"></div>
        </div>
        <!-- 전체선택 바 -->
        <label id="select-all-bar" style="display:none;align-items:center;gap:10px;margin-top:10px;padding:10px 14px;background:rgba(59,130,246,.1);border:1px solid rgba(96,165,250,.3);border-radius:10px;cursor:pointer;user-select:none;">
          <input type="checkbox" id="select-all-cb" style="width:16px;height:16px;accent-color:#3B82F6;cursor:pointer;" onchange="onSelectAllChange()">
          <span style="font-size:.8rem;color:#60A5FA;font-weight:700;" id="select-all-label">검색된 직종 전체 선택</span>
          <span style="font-size:.7rem;color:rgba(255,255,255,.35);margin-left:auto;" id="select-all-meta"></span>
        </label>
      </div>

    </div>
  </div>

</div>

<script>
const { createClient } = supabase;
const db = createClient(
  'https://byzulmxcuhsrjdphmuym.supabase.co',
  'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs'
);

let allData = [];
let displayData = [];
let selectedJob = null;
let acIdx = -1;
let chart = null;
let lastSearchJobs = null; // 마지막 전체선택 직종 목록

// ── 초기화 ──
async function init() {
  const { data, error } = await db.from('alio_jobs').select('*');
  if (error) { document.getElementById('meta-txt').textContent = '오류: ' + error.message; return; }
  allData = data || [];
  renderSummary();
  renderChart();
  renderTags();
  document.getElementById('meta-txt').textContent = `${allData.length}개 레코드 · ${new Set(allData.map(r=>r.dataset_name)).size}개 공고`;
}

// ── 요약 ──
function renderSummary() {
  const ds = new Set(allData.map(r=>r.dataset_name)).size;
  const jobs = new Set(allData.map(r=>r.job).filter(Boolean)).size;
  const ratios = allData.map(r=>parseFloat(r.ratio)).filter(v=>v>0);
  const avg = ratios.length ? (ratios.reduce((a,b)=>a+b,0)/ratios.length).toFixed(1) : '—';
  const max = ratios.length ? Math.max(...ratios).toFixed(1) : '—';
  document.getElementById('s-total').textContent = allData.length.toLocaleString();
  document.getElementById('s-ds').textContent = ds;
  document.getElementById('s-jobs').textContent = jobs;
  document.getElementById('s-avg').textContent = avg + ':1';
  document.getElementById('s-max').textContent = max + ':1';
}

// ── 차트 ──
function getJobStats(sourceData) {
  const map = {};
  (sourceData || allData).forEach(r => {
    const job = r.job || '기타';
    if (!map[job]) map[job] = { ratios:[], count:0 };
    const rv = parseFloat(r.ratio);
    if (rv>0) map[job].ratios.push(rv);
    map[job].count++;
  });
  return Object.entries(map).map(([job,v])=>({
    job, count: v.count,
    avg: v.ratios.length ? +(v.ratios.reduce((a,b)=>a+b,0)/v.ratios.length).toFixed(1) : 0,
    max: v.ratios.length ? +Math.max(...v.ratios).toFixed(1) : 0
  })).sort((a,b)=>b.avg-a.avg);
}

function renderChart(sourceData) {
  const stats = getJobStats(sourceData);
  const labels = stats.map(s=>s.job);
  const avgs = stats.map(s=>s.avg);
  const colors = avgs.map(v=>v>=80?'rgba(251,113,133,.8)':v>=30?'rgba(251,191,36,.8)':'rgba(52,211,153,.8)');
  if (chart) { chart.destroy(); chart = null; }
  const wrap = document.querySelector('.chart-wrap');
  wrap.innerHTML = '<canvas id="jobChart"></canvas>';
  const ctx = document.getElementById('jobChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '평균 경쟁률',
        data: avgs,
        backgroundColor: colors,
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (e, elements) => {
        if (!elements.length) return;
        const job = labels[elements[0].index];
        selectJobFilter(job === selectedJob ? null : job);
      },
      plugins: {
        legend: { labels: { color:'rgba(255,255,255,.45)', font:{size:11} } },
        tooltip: {
          callbacks: {
            label: ctx => `평균 경쟁률: ${ctx.parsed.y}:1`,
            afterBody: items => {
              const s = stats[items[0].dataIndex];
              return [`레코드 수: ${s.count}개`, `최고: ${s.max}:1`];
            }
          }
        }
      },
      scales: {
        x: { ticks:{color:'rgba(255,255,255,.5)',font:{size:11}}, grid:{color:'rgba(255,255,255,.04)'} },
        y: { ticks:{color:'rgba(255,255,255,.4)',callback:v=>v+':1'}, grid:{color:'rgba(255,255,255,.05)'} }
      }
    }
  });
}

// ── 직종 태그 ──
function renderTags() {
  const stats = getJobStats();
  let html = `<span class="job-tag all-tag active" onclick="selectJobFilter(null)">전체 (${allData.length})</span>`;
  stats.forEach(s => {
    html += `<span class="job-tag" data-job="${esc(s.job)}" onclick="selectJobFilter('${s.job.replace(/'/g,"\\'")}')">
      ${esc(s.job)} <span style="opacity:.4;font-size:.65rem;">${s.count}</span>
    </span>`;
  });
  document.getElementById('jobTags').innerHTML = html;
}

function selectJobFilter(job) {
  selectedJob = job;
  document.querySelectorAll('.job-tag').forEach(el => {
    const isAll = el.classList.contains('all-tag');
    el.classList.toggle('active', isAll ? !job : el.dataset.job === job);
  });
  // 현재 표시된 데이터가 있으면 필터 적용
  if (displayData.length > 0) {
    applyJobFilter();
  }
}

function applyJobFilter() {
  const src = selectedJob
    ? allData.filter(r => r.job === selectedJob)
    : allData;
  displayData = src;
  const title = selectedJob
    ? `직종: ${selectedJob}`
    : document.getElementById('result-title').textContent.includes('전체') ? '전체 데이터' : document.getElementById('result-title').textContent;
  document.getElementById('result-title').textContent = selectedJob ? `직종 필터: ${selectedJob}` : (displayData.length === allData.length ? '전체 데이터' : document.getElementById('result-title').textContent);
  renderTable();
}

// ── 전체검색 (필터 초기화) ──
function showAll() {
  selectedJob = null;
  lastSearchJobs = null;
  displayData = [];
  hideSelectAllBar();
  document.querySelectorAll('.job-tag').forEach(el => {
    el.classList.toggle('active', el.classList.contains('all-tag'));
  });
  document.getElementById('search-input').value = '';
  document.getElementById('result-title').textContent = '검색 결과';
  document.getElementById('result-count').textContent = '';
  document.getElementById('tbl-body').innerHTML = `<tr><td colspan="10" class="placeholder-msg"><span class="ico">🔎</span>직종을 선택하거나 검색하세요</td></tr>`;
  document.querySelector('.sec-title').innerHTML = `직종별 평균 경쟁률 <small>막대 클릭 → 해당 직종 필터</small>`;
  renderChart();
}

// ── 직종 검색어 자동완성 ──
function onSearchInput() {
  const q = document.getElementById('search-input').value.trim();
  acIdx = -1;
  if (!q) { closeAC(); hideSelectAllBar(); return; }

  // job 기준 매칭
  const jobMap = {};
  allData.forEach(r => {
    const job = r.job || '';
    if (job.toLowerCase().includes(q.toLowerCase())) {
      if (!jobMap[job]) jobMap[job] = 0;
      jobMap[job]++;
    }
  });
  const matches = Object.entries(jobMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,20);

  if (!matches.length) {
    document.getElementById('ac-list').innerHTML = `<div class="ac-empty">검색 결과가 없습니다</div>`;
    document.getElementById('ac-list').style.display = 'block';
    return;
  }

  const totalCnt = matches.reduce((s,[,c])=>s+c, 0);
  const allJobs = matches.map(([job])=>job);

  // 전체선택 바 표시
  const bar = document.getElementById('select-all-bar');
  const cb = document.getElementById('select-all-cb');
  const isChecked = lastSearchJobs && JSON.stringify(lastSearchJobs) === JSON.stringify(allJobs);
  document.getElementById('select-all-label').textContent = `검색된 직종 전체 선택 (${matches.length}개 직종)`;
  document.getElementById('select-all-meta').textContent = `${totalCnt}개 레코드`;
  bar._jobs = allJobs;
  cb.checked = !!isChecked;
  bar.style.display = 'flex';

  document.getElementById('ac-list').innerHTML = matches.map(([job, cnt], i) =>
    `<div class="ac-item" data-idx="${i}" onclick="selectJobBySearch('${job.replace(/'/g,"\\'")}')">
      <span class="ac-name">${highlight(job, q)}</span>
      <span class="ac-count">${cnt}개 레코드</span>
    </div>`
  ).join('');
  document.getElementById('ac-list').style.display = 'block';
}

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return esc(text);
  return esc(text.slice(0,idx)) + `<mark style="background:rgba(96,165,250,.3);color:#93C5FD;border-radius:2px;">${esc(text.slice(idx,idx+q.length))}</mark>` + esc(text.slice(idx+q.length));
}

function onSearchKeydown(e) {
  const items = document.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { acIdx = Math.min(acIdx+1, items.length-1); highlightAC(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { acIdx = Math.max(acIdx-1, 0); highlightAC(items); e.preventDefault(); }
  else if (e.key === 'Enter' && acIdx >= 0) { items[acIdx].click(); }
  else if (e.key === 'Escape') closeAC();
}

function highlightAC(items) {
  items.forEach((el,i) => el.classList.toggle('selected', i===acIdx));
}

function closeAC() {
  document.getElementById('ac-list').style.display = 'none';
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-right')) closeAC();
});

// ── 전체선택 바 숨기기 ──
function hideSelectAllBar() {
  const bar = document.getElementById('select-all-bar');
  bar.style.display = 'none';
  bar._jobs = null;
  document.getElementById('select-all-cb').checked = false;
  lastSearchJobs = null;
}

// ── 전체선택 체크박스 변경 ──
function onSelectAllChange() {
  const cb = document.getElementById('select-all-cb');
  const bar = document.getElementById('select-all-bar');
  const jobs = bar._jobs || [];
  selectedJob = null;
  document.querySelectorAll('.job-tag').forEach(el => el.classList.remove('active'));

  if (cb.checked) {
    lastSearchJobs = jobs;
    displayData = allData.filter(r => jobs.includes(r.job));
    document.getElementById('result-title').textContent = `직종 검색 전체 (${jobs.length}개 직종)`;
    document.querySelector('.sec-title').innerHTML = `직종별 평균 경쟁률 <small>검색 결과 (${jobs.length}개 직종) · 막대 클릭 → 필터</small>`;
    renderChart(displayData);
    renderTable();
  } else {
    lastSearchJobs = null;
    displayData = [];
    document.getElementById('result-title').textContent = '검색 결과';
    document.getElementById('result-count').textContent = '';
    document.getElementById('tbl-body').innerHTML = `<tr><td colspan="10" class="placeholder-msg"><span class="ico">🔎</span>직종을 선택하거나 검색하세요</td></tr>`;
    document.querySelector('.sec-title').innerHTML = `직종별 평균 경쟁률 <small>막대 클릭 → 해당 직종 필터</small>`;
    renderChart();
  }
}

// ── 직종 검색 선택 ──
function selectJobBySearch(job) {
  document.getElementById('search-input').value = job;
  closeAC();
  selectedJob = job;
  // 태그 동기화
  document.querySelectorAll('.job-tag').forEach(el => {
    el.classList.toggle('active', el.classList.contains('all-tag') ? false : el.dataset.job === job);
  });
  displayData = allData.filter(r => r.job === job);
  document.getElementById('result-title').textContent = `직종: ${job}`;
  renderTable();
}

// ── 테이블 렌더 ──
function renderTable() {
  const sortVal = document.getElementById('sort-select').value;
  const sorted = [...displayData].sort((a,b) => {
    if (sortVal==='name_asc') return (a.dataset_name||'').localeCompare(b.dataset_name||'');
    if (sortVal==='ratio_asc') return (parseFloat(a.ratio)||0)-(parseFloat(b.ratio)||0);
    if (sortVal==='ratio_desc') return (parseFloat(b.ratio)||0)-(parseFloat(a.ratio)||0);
    if (sortVal==='s1_total_desc') return (b.s1_total||0)-(a.s1_total||0);
    if (sortVal==='job_asc') return (a.job||'').localeCompare(b.job||'');
    return 0;
  });

  document.getElementById('result-count').textContent = `${sorted.length}개 레코드`;

  if (!sorted.length) {
    document.getElementById('tbl-body').innerHTML = `<tr><td colspan="10" class="placeholder-msg">결과가 없습니다</td></tr>`;
    return;
  }

  const dash = `<span class="dash">—</span>`;
  const fmt = (p,t) => t ? `<span style="color:#93C5FD;">${p||0}</span><span style="color:rgba(255,255,255,.3);">/${t}</span>` : dash;

  document.getElementById('tbl-body').innerHTML = sorted.map(r => {
    const rv = parseFloat(r.ratio)||0;
    const chipCls = rv>=80?'chip-hot':rv>=30?'chip-mid':'chip-low';
    const sc = r.stage_count||3;
    const fp = r.s5_total?r.s5_pass:r.s4_total?r.s4_pass:r.s3_pass;
    const ft = r.s5_total?r.s5_total:r.s4_total?r.s4_total:r.s3_total;
    return `<tr>
      <td><div class="ds-name" title="${esc(r.dataset_name)}">${esc(r.dataset_name)}</div></td>
      <td class="job-name">${esc(r.job||'-')}</td>
      <td style="color:rgba(255,255,255,.5);">${esc(r.region||'-')}</td>
      <td style="color:rgba(255,255,255,.35);font-size:.7rem;">${esc(r.grade||'-')}</td>
      <td class="num">${r.s1_total?.toLocaleString()||dash}</td>
      <td class="num">${r.s1_pass?.toLocaleString()||dash}</td>
      <td class="num">${fmt(r.s2_pass,r.s2_total)}</td>
      <td class="num">${sc>=4?fmt(r.s3_pass,r.s3_total):dash}</td>
      <td class="num">${fmt(fp,ft)}</td>
      <td class="num"><span class="chip ${chipCls}">${r.ratio||'—'}:1</span></td>
    </tr>`;
  }).join('');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
