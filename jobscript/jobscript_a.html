<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>직종별 채용 경쟁률 분석</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#060F1E;color:#E2E8F0;min-height:100vh;}

    /* ── 헤더 ── */
    header{background:rgba(6,15,30,.98);border-bottom:1px solid rgba(255,255,255,.07);padding:0 28px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;backdrop-filter:blur(8px);}
    .h-logo{font-size:1rem;font-weight:800;color:#60A5FA;white-space:nowrap;}
    .h-logo span{color:rgba(255,255,255,.35);font-weight:400;font-size:.8rem;margin-left:6px;}
    .h-meta{font-size:.72rem;color:rgba(255,255,255,.25);margin-left:auto;white-space:nowrap;}
    .h-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;flex-shrink:0;box-shadow:0 0 6px #22C55E;}
    .h-dot.loading{background:#FBBF24;box-shadow:0 0 6px #FBBF24;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

    /* ── 전체 wrap ── */
    .wrap{max-width:1360px;margin:0 auto;padding:20px 20px 40px;}

    /* ── 검색 패널 (최상단) ── */
    .search-panel{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px 24px;margin-bottom:16px;}
    .sp-grid{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}

    /* 좌: 검색 영역 */
    .sp-left{display:flex;flex-direction:column;gap:10px;}
    .sp-search{position:relative;}
    .sp-search input{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#E2E8F0;padding:12px 44px 12px 18px;font-size:.88rem;outline:none;transition:border-color .2s,background .2s;}
    .sp-search input:focus{border-color:#3B82F6;background:rgba(59,130,246,.07);}
    .sp-search input::placeholder{color:rgba(255,255,255,.2);}
    .sp-search .s-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);font-size:1rem;pointer-events:none;}
    .sp-search .s-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:.85rem;cursor:pointer;display:none;background:none;border:none;padding:2px;}
    .sp-search input:not(:placeholder-shown) ~ .s-ico{display:none;}
    .sp-search input:not(:placeholder-shown) ~ .s-clear{display:block;}

    .btn-reset{padding:10px 0;border-radius:12px;font-size:.8rem;font-weight:700;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1.5px solid rgba(255,255,255,.1);cursor:pointer;width:100%;transition:all .15s;}
    .btn-reset:hover{background:rgba(255,255,255,.1);color:#E2E8F0;border-color:rgba(255,255,255,.2);}

    /* 전체선택 바 */
    .select-all-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(59,130,246,.12);border:1.5px solid rgba(96,165,250,.35);border-radius:11px;}
    .select-all-bar label{display:flex;align-items:center;gap:10px;cursor:pointer;flex:1;}
    .select-all-bar input[type=checkbox]{width:17px;height:17px;accent-color:#3B82F6;cursor:pointer;flex-shrink:0;}
    .sa-text{font-size:.78rem;color:#93C5FD;font-weight:700;line-height:1.3;}
    .sa-meta{font-size:.68rem;color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);padding:2px 8px;border-radius:20px;white-space:nowrap;}

    /* 자동완성 */
    .ac-wrap{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#0B1E3A;border:1.5px solid rgba(96,165,250,.25);border-radius:12px;max-height:240px;overflow-y:auto;z-index:300;box-shadow:0 12px 32px rgba(0,0,0,.5);}
    .ac-item{padding:10px 16px;font-size:.8rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);color:#CBD5E1;display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
    .ac-item:last-child{border-bottom:none;}
    .ac-item:hover,.ac-item.sel{background:rgba(59,130,246,.18);color:#93C5FD;}
    .ac-cnt{font-size:.68rem;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:20px;flex-shrink:0;margin-left:8px;}
    .ac-empty{padding:16px;text-align:center;font-size:.8rem;color:rgba(255,255,255,.25);}

    /* 우: 직종 태그 영역 */
    .sp-right{border-left:1px solid rgba(255,255,255,.06);padding-left:20px;}
    .sp-right-label{font-size:.68rem;color:rgba(255,255,255,.25);margin-bottom:8px;letter-spacing:.04em;}
    .tag-box{height:160px;overflow-y:auto;overflow-x:hidden;}
    .tag-box::-webkit-scrollbar{width:4px;}
    .tag-box::-webkit-scrollbar-track{background:transparent;}
    .tag-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}
    .tag-bar{display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;}
    .tag{padding:4px 11px;border-radius:20px;font-size:.69rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.09);background:transparent;color:rgba(255,255,255,.45);transition:all .15s;white-space:nowrap;}
    .tag:hover{border-color:rgba(96,165,250,.5);color:#93C5FD;background:rgba(59,130,246,.08);}
    .tag.on{border-color:#3B82F6;color:#60A5FA;background:rgba(59,130,246,.18);}

    @media(max-width:900px){.sp-grid{grid-template-columns:1fr;}.sp-right{border-left:none;border-top:1px solid rgba(255,255,255,.06);padding-left:0;padding-top:14px;margin-top:4px;}.tag-box{height:120px;}}

    /* ── 활성 필터 표시 ── */
    .filter-bar{display:none;align-items:center;gap:10px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:10px 16px;margin-bottom:16px;}
    .filter-bar .fb-label{font-size:.78rem;color:rgba(52,211,153,.7);font-weight:600;}
    .filter-bar .fb-val{font-size:.8rem;color:#34D399;font-weight:700;flex:1;}
    .filter-bar .fb-cnt{font-size:.72rem;color:rgba(255,255,255,.35);}
    .filter-bar .fb-clear{background:none;border:1px solid rgba(52,211,153,.3);color:rgba(52,211,153,.7);border-radius:8px;padding:4px 10px;font-size:.72rem;cursor:pointer;transition:all .15s;}
    .filter-bar .fb-clear:hover{background:rgba(52,211,153,.15);color:#34D399;}

    /* ── 요약 카드 ── */
    .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
    .scard{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 14px;text-align:center;transition:border-color .2s;}
    .scard:hover{border-color:rgba(96,165,250,.2);}
    .scard .val{font-size:1.55rem;font-weight:800;color:#60A5FA;letter-spacing:-.02em;}
    .scard .lbl{font-size:.68rem;color:rgba(255,255,255,.3);margin-top:4px;letter-spacing:.02em;}

    /* ── 차트 ── */
    .chart-card{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px 24px;margin-bottom:16px;}
    .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
    .card-title{font-size:.88rem;font-weight:700;color:#93C5FD;}
    .card-hint{font-size:.7rem;color:rgba(255,255,255,.25);}
    .chart-wrap{position:relative;height:360px;}

    /* ── 결과 테이블 ── */
    .result-card{background:#0D1F3C;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px 24px;}
    .result-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .result-title{font-size:.88rem;font-weight:700;color:#93C5FD;}
    .result-cnt{font-size:.72rem;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:20px;}
    .sort-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.72rem;color:rgba(255,255,255,.3);}
    .sort-wrap select{background:#0A1628;border:1px solid rgba(255,255,255,.1);color:#E2E8F0;border-radius:8px;padding:5px 10px;font-size:.72rem;outline:none;cursor:pointer;}

    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:.77rem;}
    thead{position:sticky;top:56px;z-index:10;}
    th{background:#081629;color:rgba(255,255,255,.4);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap;}
    th.num{text-align:right;}
    td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:#CBD5E1;white-space:nowrap;}
    tbody tr:hover td{background:rgba(59,130,246,.05);}
    tbody tr:nth-child(even) td{background:rgba(255,255,255,.01);}
    td.num{text-align:right;font-variant-numeric:tabular-nums;}
    .td-name{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#93C5FD;font-weight:600;text-decoration:none;display:block;}
    .td-name:hover{color:#60A5FA;text-decoration:underline;}
    .td-job{color:#E2E8F0;font-weight:600;}
    .chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}
    .hot{background:rgba(251,113,133,.15);color:#FB7185;border:1px solid rgba(251,113,133,.25);}
    .mid{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.2);}
    .low{background:rgba(52,211,153,.1);color:#34D399;border:1px solid rgba(52,211,153,.18);}
    .dash{color:rgba(255,255,255,.15);}
    .pass-num{color:#93C5FD;}.slash{color:rgba(255,255,255,.2);}

    .placeholder{text-align:center;padding:60px 20px;color:rgba(255,255,255,.2);font-size:.85rem;line-height:2;}
    .placeholder .pi{font-size:2.4rem;display:block;margin-bottom:8px;}

    /* 스켈레톤 */
    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    @media(max-width:900px){
      .summary{grid-template-columns:repeat(3,1fr);}
      .sp-top{grid-template-columns:1fr;}
      .chart-wrap{height:240px;}
      .td-name{max-width:140px;}
      header{padding:0 16px;}
      .wrap{padding:14px 14px 32px;}
    }
    @media(max-width:600px){
      .summary{grid-template-columns:repeat(2,1fr);}
      .scard .val{font-size:1.3rem;}
    }
  </style>
</head>
<body>

<header>
  <div class="h-logo">📊 채용 경쟁률 분석 <span>공공기관 직종별</span></div>
  <div class="h-dot loading" id="h-dot"></div>
  <div class="h-meta" id="h-meta">불러오는 중…</div>
</header>

<div class="wrap">

  <!-- 검색 패널 -->
  <div class="search-panel">
    <div class="sp-grid">

      <!-- 좌: 검색 -->
      <div class="sp-left">
        <div class="sp-search">
          <input type="text" id="search-input" placeholder="직종 검색 (예: 전기, 기계, 사무…)"
            oninput="onInput()" onkeydown="onKey(event)" autocomplete="off"/>
          <span class="s-ico">🔍</span>
          <button class="s-clear" onclick="clearSearch()">✕</button>
          <div class="ac-wrap" id="ac-list" style="display:none;"></div>
        </div>

        <!-- 전체선택 바 -->
        <div class="select-all-bar" id="sa-bar">
          <label>
            <input type="checkbox" id="sa-cb" onchange="onSaChange()">
            <span class="sa-text" id="sa-text">검색된 직종 전체 선택</span>
          </label>
          <span class="sa-meta" id="sa-meta"></span>
        </div>

        <button class="btn-reset" onclick="resetAll()">↺ 필터 초기화</button>
      </div>

      <!-- 우: 직종 태그 -->
      <div class="sp-right">
        <div class="sp-right-label">직종 필터 (클릭으로 선택)</div>
        <div class="tag-box">
          <div class="tag-bar" id="tagBar"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- 활성 필터 표시 -->
  <div class="filter-bar" id="filter-bar">
    <span class="fb-label">필터</span>
    <span class="fb-val" id="fb-val"></span>
    <span class="fb-cnt" id="fb-cnt"></span>
    <button class="fb-clear" onclick="resetAll()">✕ 해제</button>
  </div>

  <!-- 요약 카드 -->
  <div class="summary">
    <div class="scard"><div class="val" id="s-total">—</div><div class="lbl">전체 레코드</div></div>
    <div class="scard"><div class="val" id="s-ds">—</div><div class="lbl">공고 수</div></div>
    <div class="scard"><div class="val" id="s-jobs">—</div><div class="lbl">직종 수</div></div>
    <div class="scard"><div class="val" id="s-avg">—</div><div class="lbl">평균 경쟁률</div></div>
    <div class="scard"><div class="val" id="s-max">—</div><div class="lbl">최고 경쟁률</div></div>
  </div>

  <!-- 차트 -->
  <div class="chart-card">
    <div class="card-head">
      <div class="card-title" id="chart-title">직종별 평균 경쟁률</div>
      <div class="card-hint">막대 클릭 → 해당 직종 필터</div>
    </div>
    <div class="chart-wrap"><canvas id="jobChart"></canvas></div>
  </div>

  <!-- 결과 테이블 -->
  <div class="result-card">
    <div class="result-head">
      <div class="result-title" id="result-title">검색 결과</div>
      <span class="result-cnt" id="result-cnt" style="display:none;"></span>
      <div class="sort-wrap">
        정렬
        <select id="sort-sel" onchange="renderTable()">
          <option value="ratio_desc">경쟁률 높은순</option>
          <option value="ratio_asc">경쟁률 낮은순</option>
          <option value="name_asc">공고명순</option>
          <option value="s1_total_desc">응시인원 많은순</option>
          <option value="job_asc">직종명순</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>공고명</th><th>직종</th><th>지역</th><th>직급</th>
            <th class="num">1차응시</th><th class="num">1차합격</th>
            <th class="num">2차</th><th class="num">3차</th>
            <th class="num">최종합격</th><th class="num">경쟁률</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="10" class="placeholder">
            <span class="pi">🔎</span>
            직종을 검색하거나 태그를 클릭하세요
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const { createClient } = supabase;
const db = createClient(
  'https://byzulmxcuhsrjdphmuym.supabase.co',
  'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs'
);

let allData = [], displayData = [], selectedJob = null, acIdx = -1, chart = null;
let saJobs = null; // 전체선택 바에 현재 바인딩된 직종 목록

// ── 초기화 ──
async function init() {
  const { data, error } = await db.from('alio_jobs').select('*');
  const dot = document.getElementById('h-dot');
  dot.classList.remove('loading');
  if (error) {
    document.getElementById('h-meta').textContent = '오류: ' + error.message;
    return;
  }
  allData = data || [];
  renderSummary();
  renderChart();
  renderTags();
  document.getElementById('h-meta').textContent =
    `${allData.length.toLocaleString()}개 레코드 · ${new Set(allData.map(r=>r.dataset_name)).size}개 공고`;
}

// ── 요약 ──
function renderSummary() {
  const ds = new Set(allData.map(r=>r.dataset_name)).size;
  const jobs = new Set(allData.map(r=>r.job).filter(Boolean)).size;
  const ratios = allData.map(r=>parseFloat(r.ratio)).filter(v=>v>0);
  const avg = ratios.length ? (ratios.reduce((a,b)=>a+b,0)/ratios.length).toFixed(1) : '—';
  const max = ratios.length ? Math.max(...ratios).toFixed(1) : '—';
  document.getElementById('s-total').textContent = allData.length.toLocaleString();
  document.getElementById('s-ds').textContent = ds;
  document.getElementById('s-jobs').textContent = jobs;
  document.getElementById('s-avg').textContent = avg + ':1';
  document.getElementById('s-max').textContent = max + ':1';
}

// ── 차트 ──
function getStats(src) {
  const map = {};
  (src || allData).forEach(r => {
    const j = r.job || '기타';
    if (!map[j]) map[j] = { ratios:[], count:0, datasets: new Set() };
    const v = parseFloat(r.ratio);
    if (v > 0) map[j].ratios.push(v);
    map[j].count++;
    if (r.dataset_name) map[j].datasets.add(r.dataset_name);
  });
  return Object.entries(map).map(([job,v]) => ({
    job, count: v.count,
    avg: v.ratios.length ? +(v.ratios.reduce((a,b)=>a+b,0)/v.ratios.length).toFixed(1) : 0,
    max: v.ratios.length ? +Math.max(...v.ratios).toFixed(1) : 0,
    datasets: [...v.datasets]
  })).sort((a,b) => b.avg - a.avg);
}

function renderChart(src) {
  const stats = getStats(src);
  const labels = stats.map(s => s.job);
  const avgs = stats.map(s => s.avg);
  const colors = avgs.map(v => v>=80?'rgba(251,113,133,.85)':v>=30?'rgba(251,191,36,.85)':'rgba(52,211,153,.85)');
  const bords = avgs.map(v => v>=80?'rgba(251,113,133,1)':v>=30?'rgba(251,191,36,1)':'rgba(52,211,153,1)');

  if (chart) { chart.destroy(); chart = null; }
  document.querySelector('.chart-wrap').innerHTML = '<canvas id="jobChart"></canvas>';
  const ctx = document.getElementById('jobChart').getContext('2d');

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '평균 경쟁률',
        data: avgs,
        backgroundColor: colors,
        borderColor: bords,
        borderWidth: 1,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (e, els) => {
        if (!els.length) return;
        const job = labels[els[0].index];
        selectJob(job === selectedJob ? null : job);
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(6,15,30,.95)',
          borderColor: 'rgba(96,165,250,.3)',
          borderWidth: 1,
          titleColor: '#93C5FD',
          bodyColor: 'rgba(255,255,255,.7)',
          padding: 12,
          callbacks: {
            title: items => items[0].label,
            label: ctx => `  평균 경쟁률: ${ctx.parsed.y}:1`,
            afterBody: items => {
              const s = stats[items[0].dataIndex];
              const lines = [`  응시 레코드: ${s.count}개`, `  최고 경쟁률: ${s.max}:1`];
              if (s.datasets.length) {
                lines.push('');
                lines.push('  📋 공고명');
                const shown = s.datasets.slice(0, 5);
                shown.forEach(d => lines.push(`  · ${d}`));
                if (s.datasets.length > 5) lines.push(`  · 외 ${s.datasets.length - 5}개`);
              }
              return lines;
            }
          }
        }
      },
      scales: {
        x: {
          ticks:{ color:'rgba(255,255,255,.45)', font:{size:11}, maxRotation:45 },
          grid:{ color:'rgba(255,255,255,.03)' }
        },
        y: {
          ticks:{ color:'rgba(255,255,255,.35)', callback: v => v+':1' },
          grid:{ color:'rgba(255,255,255,.05)' }
        }
      }
    }
  });
}

// ── 직종 태그 ──
function renderTags() {
  const stats = getStats();
  let html = `<span class="tag on" data-job="" onclick="selectJob(null)">전체 <small style="opacity:.5">${allData.length}</small></span>`;
  stats.forEach(s => {
    html += `<span class="tag" data-job="${esc(s.job)}" onclick="selectJob('${s.job.replace(/'/g,"\\'")}')">
      ${esc(s.job)} <small style="opacity:.4">${s.count}</small>
    </span>`;
  });
  document.getElementById('tagBar').innerHTML = html;
}

// ── 직종 선택 ──
function selectJob(job) {
  selectedJob = job;
  document.querySelectorAll('.tag').forEach(el => {
    el.classList.toggle('on', el.dataset.job === (job||''));
  });
  if (job) {
    displayData = allData.filter(r => r.job === job);
    setFilterBar(`직종: ${job}`, displayData.length);
    document.getElementById('chart-title').textContent = `직종별 평균 경쟁률 — ${job} 선택`;
    renderChart(displayData);
    renderTable();
  } else {
    displayData = [];
    clearFilterBar();
    document.getElementById('chart-title').textContent = '직종별 평균 경쟁률';
    renderChart();
    clearTable();
  }
}

// ── 필터 바 ──
function setFilterBar(label, cnt) {
  const bar = document.getElementById('filter-bar');
  document.getElementById('fb-val').textContent = label;
  document.getElementById('fb-cnt').textContent = `${cnt}개 레코드`;
  bar.style.display = 'flex';
}
function clearFilterBar() {
  document.getElementById('filter-bar').style.display = 'none';
}

// ── 초기화 ──
function resetAll() {
  selectedJob = null;
  saJobs = null;
  displayData = [];
  document.getElementById('search-input').value = '';
  closeAC();
  hideSaBar();
  clearFilterBar();
  document.querySelectorAll('.tag').forEach(el => el.classList.toggle('on', el.dataset.job === ''));
  document.getElementById('chart-title').textContent = '직종별 평균 경쟁률';
  renderChart();
  clearTable();
}

// ── 검색 입력 ──
function onInput() {
  const q = document.getElementById('search-input').value.trim();
  acIdx = -1;
  if (!q) { closeAC(); hideSaBar(); return; }

  const jobMap = {};
  allData.forEach(r => {
    const j = r.job || '';
    if (j.toLowerCase().includes(q.toLowerCase())) {
      jobMap[j] = (jobMap[j] || 0) + 1;
    }
  });
  const matches = Object.entries(jobMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(0, 20);

  if (!matches.length) {
    document.getElementById('ac-list').innerHTML = `<div class="ac-empty">검색 결과 없음</div>`;
    document.getElementById('ac-list').style.display = 'block';
    hideSaBar();
    return;
  }

  // 전체선택 바 업데이트
  const totalCnt = matches.reduce((s,[,c])=>s+c, 0);
  const jobs = matches.map(([j])=>j);
  showSaBar(jobs, totalCnt);

  document.getElementById('ac-list').innerHTML = matches.map(([job, cnt], i) =>
    `<div class="ac-item" data-i="${i}" onclick="pickJob('${job.replace(/'/g,"\\'")}')">
      <span>${hl(job, q)}</span>
      <span class="ac-cnt">${cnt}개</span>
    </div>`
  ).join('');
  document.getElementById('ac-list').style.display = 'block';
}

function hl(text, q) {
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(text);
  return esc(text.slice(0,i)) + `<mark style="background:rgba(96,165,250,.3);color:#93C5FD;border-radius:2px;padding:0 1px;">${esc(text.slice(i,i+q.length))}</mark>` + esc(text.slice(i+q.length));
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  closeAC();
  hideSaBar();
}

function onKey(e) {
  const items = document.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key==='ArrowDown') { acIdx=Math.min(acIdx+1,items.length-1); hlAC(items); e.preventDefault(); }
  else if (e.key==='ArrowUp') { acIdx=Math.max(acIdx-1,0); hlAC(items); e.preventDefault(); }
  else if (e.key==='Enter' && acIdx>=0) items[acIdx].click();
  else if (e.key==='Escape') closeAC();
}
function hlAC(items) { items.forEach((el,i)=>el.classList.toggle('sel',i===acIdx)); }
function closeAC() { document.getElementById('ac-list').style.display='none'; }

document.addEventListener('click', e => {
  if (!e.target.closest('.sp-search')) closeAC();
});

// ── 직종 선택 (검색 자동완성) ──
function pickJob(job) {
  document.getElementById('search-input').value = job;
  closeAC();
  selectedJob = job;
  document.querySelectorAll('.tag').forEach(el =>
    el.classList.toggle('on', el.dataset.job === job)
  );
  displayData = allData.filter(r => r.job === job);
  setFilterBar(`직종: ${job}`, displayData.length);
  document.getElementById('chart-title').textContent = `직종별 평균 경쟁률 — ${job}`;
  renderChart(displayData);
  renderTable();
}

// ── 전체선택 바 ──
function showSaBar(jobs, totalCnt) {
  const bar = document.getElementById('sa-bar');
  const cb = document.getElementById('sa-cb');
  saJobs = jobs;
  document.getElementById('sa-text').textContent = `검색된 직종 전체 선택 (${jobs.length}개 직종)`;
  document.getElementById('sa-meta').textContent = `${totalCnt}개 레코드`;
  cb.checked = false; // 새 검색마다 체크 초기화
  bar.style.display = 'flex';
}

function hideSaBar() {
  document.getElementById('sa-bar').style.display = 'none';
  document.getElementById('sa-cb').checked = false;
  saJobs = null;
}

function onSaChange() {
  const checked = document.getElementById('sa-cb').checked;
  const jobs = saJobs || [];

  selectedJob = null;
  document.querySelectorAll('.tag').forEach(el => el.classList.remove('on'));

  if (checked) {
    displayData = allData.filter(r => jobs.includes(r.job));
    setFilterBar(`직종 전체 선택 (${jobs.length}개)`, displayData.length);
    document.getElementById('chart-title').textContent = `직종별 평균 경쟁률 — ${jobs.length}개 직종 선택`;
    renderChart(displayData);
    renderTable();
  } else {
    displayData = [];
    clearFilterBar();
    document.getElementById('chart-title').textContent = '직종별 평균 경쟁률';
    renderChart();
    clearTable();
  }
}

// ── 테이블 ──
function clearTable() {
  document.getElementById('result-title').textContent = '검색 결과';
  document.getElementById('result-cnt').style.display = 'none';
  document.getElementById('tbl-body').innerHTML = `<tr><td colspan="10" class="placeholder"><span class="pi">🔎</span>직종을 검색하거나 태그를 클릭하세요</td></tr>`;
}

function renderTable() {
  const sortVal = document.getElementById('sort-sel').value;
  const sorted = [...displayData].sort((a,b) => {
    if (sortVal==='name_asc') return (a.dataset_name||'').localeCompare(b.dataset_name||'');
    if (sortVal==='ratio_asc') return (parseFloat(a.ratio)||0)-(parseFloat(b.ratio)||0);
    if (sortVal==='ratio_desc') return (parseFloat(b.ratio)||0)-(parseFloat(a.ratio)||0);
    if (sortVal==='s1_total_desc') return (b.s1_total||0)-(a.s1_total||0);
    if (sortVal==='job_asc') return (a.job||'').localeCompare(b.job||'');
    return 0;
  });

  const cnt = document.getElementById('result-cnt');
  cnt.textContent = `${sorted.length}개`;
  cnt.style.display = '';

  if (!sorted.length) {
    document.getElementById('tbl-body').innerHTML = `<tr><td colspan="10" class="placeholder">결과가 없습니다</td></tr>`;
    return;
  }

  const dash = `<span class="dash">—</span>`;
  const fmt = (p,t) => t
    ? `<span class="pass-num">${p??0}</span><span class="slash">/</span>${t}`
    : dash;

  document.getElementById('tbl-body').innerHTML = sorted.map(r => {
    const rv = parseFloat(r.ratio)||0;
    const cls = rv>=80?'hot':rv>=30?'mid':'low';
    const sc = r.stage_count||3;
    const fp = r.s5_total?r.s5_pass:r.s4_total?r.s4_pass:r.s3_pass;
    const ft = r.s5_total?r.s5_total:r.s4_total?r.s4_total:r.s3_total;
    return `<tr>
      <td><a class="td-name" href="https://ibtcc.kr/competition.html?ds=${encodeURIComponent(r.dataset_name)}" target="_blank" title="${esc(r.dataset_name)}">${esc(r.dataset_name)}</a></td>
      <td class="td-job">${esc(r.job||'—')}</td>
      <td style="color:rgba(255,255,255,.45);">${esc(r.region||'—')}</td>
      <td style="color:rgba(255,255,255,.3);font-size:.7rem;">${esc(r.grade||'—')}</td>
      <td class="num">${r.s1_total?.toLocaleString()||dash}</td>
      <td class="num">${r.s1_pass?.toLocaleString()||dash}</td>
      <td class="num">${fmt(r.s2_pass,r.s2_total)}</td>
      <td class="num">${sc>=4?fmt(r.s3_pass,r.s3_total):dash}</td>
      <td class="num">${fmt(fp,ft)}</td>
      <td class="num"><span class="chip ${cls}">${r.ratio||'—'}:1</span></td>
    </tr>`;
  }).join('');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
