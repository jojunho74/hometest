<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>채용달력 — G-TELP IBT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#F8FAFF;color:#1E293B;}
    header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #E2E8F0;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .hinner{max-width:1200px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .hlogo{font-size:1rem;font-weight:800;color:#1E4D8C;text-decoration:none;white-space:nowrap;flex-shrink:0;}
    .hnav{display:flex;align-items:center;gap:4px;font-size:0.8rem;font-weight:600;}
    .hnav a{color:#475569;text-decoration:none;transition:background .18s,color .18s;padding:5px 9px;border-radius:8px;font-size:0.78rem;}
    .hnav a:hover,.hnav a.active{background:#1E4D8C;color:#fff;}
    .hbtn{padding:8px 18px;border-radius:8px;font-size:0.8rem;font-weight:700;background:#1E4D8C;color:#fff;text-decoration:none;transition:background .15s;}
    .hbtn:hover{background:#163870;}
    .hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:#1E4D8C;border:none;padding:6px;border-radius:8px;}
    .hamburger span{display:block;height:2px;background:#fff;border-radius:2px;}
    .mobile-menu{display:none;flex-direction:column;background:#fff;border-top:1px solid #E2E8F0;padding:12px 16px 16px;}
    .mobile-menu a{padding:12px 4px;font-size:0.9rem;font-weight:600;color:#1E293B;text-decoration:none;border-bottom:1px solid #F1F5F9;}
    .mobile-menu a:last-child{border-bottom:none;}
    .mobile-menu .mbtn{margin-top:12px;display:block;text-align:center;padding:12px;border-radius:8px;background:#1E4D8C;color:#fff;font-weight:700;text-decoration:none;}
    .mobile-menu.open{display:flex;}
    @media(max-width:768px){.hnav{display:none;}.hbtn{display:none;}.hamburger{display:flex;}}

    /* 메인 레이아웃 */
    .main-wrap{max-width:1200px;margin:0 auto;padding:28px 16px 60px;}
    .page-title{font-size:1.25rem;font-weight:800;color:#1E293B;margin-bottom:20px;}

    .layout{display:flex;gap:20px;align-items:flex-start;}

    /* 좌측: 채용공고 카드 그리드 */
    .left-panel{flex:1;min-width:0;}
    .left-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .panel-label{font-size:13px;font-weight:700;color:#64748B;}
    .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .job-card{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,.08);padding:18px;display:flex;flex-direction:column;min-height:140px;box-shadow:0 1px 4px rgba(0,0,0,.06);text-decoration:none;transition:box-shadow .2s;}
    .job-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);}
    .job-card img{height:50px;width:auto;max-width:100%;object-fit:contain;border-radius:4px;margin-bottom:8px;}
    .job-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:#EFF6FF;color:#1E4D8C;margin-bottom:6px;}
    .job-title{font-weight:700;font-size:0.8rem;line-height:1.4;flex:1;}
    .job-date{font-size:10px;color:#94A3B8;margin-top:10px;}
    /* 슬라이더 도트 */
    .slider-nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
    .slider-dots{display:flex;gap:6px;justify-content:center;flex:1;}
    .s-arrow{width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid #E2E8F0;box-shadow:0 1px 4px rgba(0,0,0,.1);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#1E293B;flex-shrink:0;}
    .s-arrow:hover{background:#EFF6FF;}

    /* 우측: 채용달력 스크롤 리스트 */
    .right-panel{width:300px;flex-shrink:0;}
    .right-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .cal-box{background:#fff;border-radius:12px;border:1px solid #E2E8F0;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;}
    .cal-box-head{padding:12px 16px;border-bottom:1px solid #F1F5F9;font-size:12px;font-weight:700;color:#475569;display:flex;align-items:center;justify-content:space-between;}
    .cal-scroll-wrap{height:440px;overflow:hidden;position:relative;}
    .cal-scroll-inner{transition:transform .6s cubic-bezier(.4,0,.2,1);}
    .cal-row{display:flex;align-items:center;gap:0;padding:9px 14px;border-bottom:1px solid #F8FAFF;}
    .cal-row:last-child{border-bottom:none;}
    .cal-row:hover{background:#F8FAFF;}
    .cal-row-date{font-size:11px;font-weight:600;color:#64748B;width:68px;flex-shrink:0;font-family:monospace;}
    .cal-row-type{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0;width:42px;text-align:center;}
    .type-시작{background:#DBEAFE;color:#1E40AF;}
    .type-마감{background:#FEE2E2;color:#B91C1C;}
    .type-인적성{background:#FEF3C7;color:#92400E;}
    .type-기타{background:#F1F5F9;color:#475569;}
    .cal-row-co{font-size:12px;color:#1E293B;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:8px;}
    .cal-progress{height:3px;background:#EFF6FF;}
    .cal-progress-bar{height:100%;background:#1E4D8C;transition:width .3s linear;}

    /* 반응형 */
    @media(max-width:900px){
      .layout{flex-direction:column;}
      .right-panel{width:100%;}
      .cards-grid{grid-template-columns:repeat(3,1fr);}
    }
    @media(max-width:560px){
      .cards-grid{grid-template-columns:repeat(2,1fr);}
      .right-panel{width:100%;}
    }
  </style>
</head>
<body>

<header>
  <div class="hinner">
    <a href="index.html" class="hlogo">지텔프IBT 대학컨설팅</a>
    <nav class="hnav">
      <a href="index.html#about">서비스 소개</a>
      <a href="package.html">패키지</a>
      <a href="student.html">IBT 학생 신청</a>
      <a href="library-pdf.html">채용공고 자료실</a>
      <a href="job-calendar.html" class="active">채용달력</a>
      <a href="gtelp-score.html">점수대비표</a>
    </nav>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="index.html#consultation-form" class="hbtn">무료 신청하기</a>
      <button class="hamburger" id="hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html#about">서비스 소개</a>
    <a href="package.html">패키지</a>
    <a href="student.html">IBT 학생 신청</a>
    <a href="library-pdf.html">채용공고 자료실</a>
    <a href="job-calendar.html">채용달력</a>
    <a href="gtelp-score.html">점수대비표</a>
    <a href="index.html#consultation-form" class="mbtn">무료 신청하기</a>
  </div>
</header>

<div class="main-wrap">
  <div class="layout">

    <!-- ── 좌측: 채용공고 카드 3열 ── -->
    <div class="left-panel">
      <div class="left-header">
        <span class="panel-label">채용공고</span>
        <span id="jobs-count" style="font-size:11px;color:#94A3B8;"></span>
      </div>
      <div class="cards-grid" id="cards-grid">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:#94A3B8;font-size:14px;">불러오는 중...</div>
      </div>
      <div class="slider-nav" id="slider-nav" style="display:none;">
        <button class="s-arrow" onclick="jobSlide(-1)">‹</button>
        <div class="slider-dots" id="slider-dots"></div>
        <button class="s-arrow" onclick="jobSlide(1)">›</button>
      </div>
    </div>

    <!-- ── 우측: 채용달력 스크롤 리스트 ── -->
    <div class="right-panel">
      <div class="right-header">
        <span class="panel-label">채용달력</span>
        <span id="cal-total" style="font-size:11px;color:#94A3B8;"></span>
      </div>
      <div class="cal-box">
        <div class="cal-box-head">
          <span id="cal-range-label">날짜</span>
          <span id="cal-page-label" style="font-size:11px;color:#94A3B8;"></span>
        </div>
        <div class="cal-scroll-wrap" id="cal-scroll-wrap">
          <div class="cal-scroll-inner" id="cal-scroll-inner">
            <div style="text-align:center;padding:40px;color:#94A3B8;font-size:13px;">불러오는 중...</div>
          </div>
        </div>
        <div class="cal-progress"><div class="cal-progress-bar" id="cal-progress-bar" style="width:0%"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
  const { createClient } = supabase;
  const _sb = createClient(
    'https://byzulmxcuhsrjdphmuym.supabase.co',
    'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs'
  );

  // ── 채용공고 카드 (3열, 6개/페이지) ──
  const JOB_PER = 6;
  let jobPage = 0, jobPages = [];

  function buildJobCards() {
    const grid = document.getElementById('cards-grid');
    if (!jobPages.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#94A3B8;">등록된 채용공고가 없습니다.</div>'; return; }
    const page = jobPages[jobPage];
    grid.innerHTML = page.map(r => {
      const date = new Date(r.created_at);
      const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}.`;
      const bg = r.bg_color || '#FFFFFF';
      const darkBg = (function(h){const rv=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(rv*.299+g*.587+b*.114)<128;})(bg);
      const tc = darkBg?'#fff':'#1E293B', sc = darkBg?'rgba(255,255,255,.65)':'#94A3B8';
      const bbg = darkBg?'rgba(255,255,255,.2)':'#EFF6FF', bc = darkBg?'#fff':'#1E4D8C';
      const logoHtml = r.logo_url ? `<img src="${r.logo_url}" alt="${r.school_name}" style="height:50px;width:auto;max-width:100%;object-fit:contain;border-radius:4px;margin-bottom:8px;"/>` : '';
      const inner = `${logoHtml}<span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:${bbg};color:${bc};margin-bottom:6px;">${r.school_name}</span><p style="font-weight:700;font-size:0.8rem;line-height:1.4;color:${tc};flex:1;">${r.title}</p><p style="font-size:10px;color:${sc};margin-top:10px;">${dateStr}</p>`;
      const style = `background:${bg};`;
      return r.link
        ? `<a href="${r.link}" target="_blank" class="job-card" style="${style}">${inner}</a>`
        : `<div class="job-card" style="${style}">${inner}</div>`;
    }).join('');
    renderJobDots();
  }

  function renderJobDots() {
    const dots = document.getElementById('slider-dots');
    dots.innerHTML = jobPages.map((_,i) =>
      `<button onclick="jobGoTo(${i})" style="width:${i===jobPage?'20px':'8px'};height:8px;border-radius:4px;border:none;cursor:pointer;transition:all .3s;background:${i===jobPage?'#1E4D8C':'#CBD5E1'};"></button>`
    ).join('');
  }

  function jobGoTo(p) { jobPage = p; buildJobCards(); }
  window.jobSlide = d => jobGoTo(Math.max(0, Math.min(jobPages.length-1, jobPage+d)));

  (async function loadJobs() {
    const { data, error } = await _sb.from('job_postings').select('*').order('sort_order', { ascending: true });
    if (error || !data || !data.length) return;
    document.getElementById('jobs-count').textContent = `총 ${data.length}건`;
    jobPages = [];
    for (let i = 0; i < data.length; i += JOB_PER) jobPages.push(data.slice(i, i+JOB_PER));
    buildJobCards();
    document.getElementById('slider-nav').style.display = 'flex';
    // 자동 슬라이드 5초
    setInterval(() => jobGoTo((jobPage+1) % jobPages.length), 5000);
  })();

  // ── 채용달력 스크롤 리스트 ──
  const CAL_PER = 10;
  let calData = [], calPage = 0, calTimer = null, calFirstRender = true;

  function typeClass(t) {
    if (t === '시작') return 'type-시작';
    if (t === '마감') return 'type-마감';
    if (t === '인적성') return 'type-인적성';
    return 'type-기타';
  }

  function renderCalPage() {
    if (!calData.length) return;
    const total = calData.length;
    const pages = Math.ceil(total / CAL_PER);
    const start = calPage * CAL_PER;
    const slice = calData.slice(start, start + CAL_PER);

    // 레이블
    const d0 = slice[0].event_date || '', d1 = slice[slice.length-1].event_date || '';
    document.getElementById('cal-range-label').textContent = d0 === d1 ? d0 : d0 + ' ~ ' + d1;
    document.getElementById('cal-page-label').textContent = (calPage+1) + '/' + pages;
    document.getElementById('cal-total').textContent = '총 ' + total + '건';
    document.getElementById('cal-progress-bar').style.width = ((calPage+1)/pages*100) + '%';

    const html = slice.map(function(e) {
      return '<div class="cal-row">' +
        '<span class="cal-row-date">' + (e.event_date||'') + '</span>' +
        '<span class="cal-row-type ' + typeClass(e.event_type) + '">' + (e.event_type||'') + '</span>' +
        '<span class="cal-row-co" title="' + (e.company||'') + '">' + (e.company||'') + '</span>' +
      '</div>';
    }).join('');

    const inner = document.getElementById('cal-scroll-inner');

    if (calFirstRender) {
      // 첫 로드는 애니메이션 없이 바로 표시
      inner.style.transition = 'none';
      inner.style.opacity = '1';
      inner.style.transform = 'translateY(0)';
      inner.innerHTML = html;
      calFirstRender = false;
    } else {
      // 이후는 페이드 전환
      inner.style.transition = 'opacity .3s ease';
      inner.style.opacity = '0';
      setTimeout(function() {
        inner.innerHTML = html;
        inner.style.opacity = '1';
      }, 300);
    }
  }

  function calNext() {
    const pages = Math.ceil(calData.length / CAL_PER);
    calPage = (calPage + 1) % pages;
    renderCalPage();
  }

  (async function loadCalendar() {
    try {
      const { data, error } = await _sb.from('job_calendar').select('*').order('event_date', { ascending: true });
      const inner = document.getElementById('cal-scroll-inner');
      if (error) {
        inner.innerHTML = '<div style="text-align:center;padding:30px;color:#EF4444;font-size:12px;">오류: ' + error.message + '</div>';
        return;
      }
      calData = data || [];
      if (!calData.length) {
        inner.innerHTML = '<div style="text-align:center;padding:40px;color:#94A3B8;font-size:13px;">등록된 데이터가 없습니다.</div>';
        return;
      }
      renderCalPage();
      calTimer = setInterval(calNext, 5000);
    } catch(e) {
      document.getElementById('cal-scroll-inner').innerHTML = '<div style="text-align:center;padding:30px;color:#EF4444;font-size:12px;">' + e.message + '</div>';
    }
  })();
</script>
</body>
</html>
