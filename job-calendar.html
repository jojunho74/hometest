<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>채용달력 — G-TELP IBT</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#F8FAFF;color:#1E293B;min-height:100vh;}
    header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #E2E8F0;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .hinner{max-width:1200px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .hlogo{font-size:1rem;font-weight:800;color:#1E4D8C;text-decoration:none;white-space:nowrap;}
    .hnav{display:flex;align-items:center;gap:4px;}
    .hnav a{color:#475569;text-decoration:none;padding:5px 9px;border-radius:8px;font-size:0.78rem;font-weight:600;}
    .hnav a:hover,.hnav a.active{background:#1E4D8C;color:#fff;}
    .hbtn{padding:8px 18px;border-radius:8px;font-size:0.8rem;font-weight:700;background:#1E4D8C;color:#fff;text-decoration:none;}
    @media(max-width:768px){.hnav{display:none;}.hbtn{display:none;}}

    .wrap{max-width:1200px;margin:0 auto;padding:28px 16px 60px;}
    .section-hd{font-size:13px;font-weight:700;color:#64748B;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}

    /* 카드 그리드 */
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    @media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr);}}
    .card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:16px;display:flex;flex-direction:column;min-height:140px;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:box-shadow .2s;}
    .card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);}
    .card img{height:48px;width:auto;max-width:100%;object-fit:contain;margin-bottom:8px;}
    .card-name{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:6px;}
    .card-title{font-size:0.8rem;font-weight:700;line-height:1.4;flex:1;}
    .card-date{font-size:10px;color:#94A3B8;margin-top:10px;}
    .nav-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;}
    .arrow{width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid #E2E8F0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#1E293B;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    .arrow:hover{background:#EFF6FF;}
    .dot{height:8px;border-radius:4px;border:none;cursor:pointer;transition:all .3s;}

    /* 구분선 */
    .divider{height:1px;background:#E2E8F0;margin:32px 0;}

    /* 채용달력 가로형 테이블 */
    .cal-section{background:#fff;border-radius:16px;border:1px solid #E2E8F0;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;}
    .cal-section-hd{padding:14px 20px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .cal-section-hd-left{display:flex;align-items:center;gap:12px;}
    .cal-section-title{font-size:15px;font-weight:800;color:#1E293B;}
    .cal-meta{font-size:12px;color:#94A3B8;}
    .cal-page-info{font-size:12px;color:#64748B;font-weight:600;}
    .cal-prog{height:3px;background:#EFF6FF;}
    .cal-prog-bar{height:3px;background:#1E4D8C;transition:width .4s;}
    .cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;}
    @media(max-width:700px){.cal-grid{grid-template-columns:repeat(2,1fr);}}
    .cal-cell{padding:12px 16px;border-right:1px solid #F1F5F9;border-bottom:1px solid #F1F5F9;display:flex;flex-direction:column;gap:4px;}
    .cal-cell:nth-child(5n){border-right:none;}
    @media(max-width:700px){.cal-cell:nth-child(2n){border-right:none;}.cal-cell:nth-child(5n){border-right:1px solid #F1F5F9;}.cal-cell:nth-child(2n){border-right:none;}}
    .cal-cell-dt{font-size:11px;font-weight:700;color:#64748B;font-family:monospace;}
    .cal-cell-tp{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-bottom:2px;width:fit-content;}
    .tp-s{background:#DBEAFE;color:#1E40AF;}
    .tp-e{background:#FEE2E2;color:#B91C1C;}
    .tp-a{background:#FEF3C7;color:#92400E;}
    .tp-o{background:#F1F5F9;color:#475569;}
    .cal-cell-co{font-size:12px;font-weight:700;color:#1E293B;line-height:1.35;}
    .cal-nav-foot{padding:12px 20px;border-top:1px solid #F1F5F9;display:flex;align-items:center;justify-content:center;gap:8px;}
    .msg{text-align:center;padding:40px;color:#94A3B8;font-size:14px;}
    .err{text-align:center;padding:20px;color:#EF4444;font-size:13px;}
  </style>
</head>
<body>

<header>
  <div class="hinner">
    <a href="index.html" class="hlogo">지텔프IBT 대학컨설팅</a>
    <nav class="hnav">
      <a href="index.html#about">서비스 소개</a>
      <a href="package.html">패키지</a>
      <a href="student.html">IBT 학생 신청</a>
      <a href="library-pdf.html">채용공고 자료실</a>
      <a href="job-calendar.html" class="active">채용달력</a>
      <a href="gtelp-score.html">점수대비표</a>
    </nav>
    <a href="index.html#consultation-form" class="hbtn">무료 신청하기</a>
  </div>
</header>

<div style="background:#1E4D8C;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:700;">채용달력 페이지 v5 — 2026.04</div>

<div class="wrap">

  <!-- 채용공고 카드 -->
  <div class="section-hd">
    <span>채용공고</span>
    <span id="jobs-count" style="font-weight:400;color:#94A3B8;font-size:12px;"></span>
  </div>
  <div class="cards" id="cards">
    <div class="msg" style="grid-column:1/-1;">불러오는 중...</div>
  </div>
  <div class="nav-row" id="nav-row" style="display:none;">
    <button class="arrow" onclick="jPrev()">‹</button>
    <div id="dots" style="display:flex;gap:6px;"></div>
    <button class="arrow" onclick="jNext()">›</button>
  </div>

  <div class="divider"></div>

  <!-- 채용달력 (가로형) -->
  <div class="section-hd">
    <span>채용달력</span>
    <span id="cal-count" style="font-weight:400;color:#94A3B8;font-size:12px;"></span>
  </div>
  <div class="cal-section">
    <div class="cal-section-hd">
      <div class="cal-section-hd-left">
        <span class="cal-section-title">📅 채용일정</span>
        <span class="cal-meta" id="cal-range"></span>
      </div>
      <span class="cal-page-info" id="cal-pg"></span>
    </div>
    <div class="cal-prog"><div class="cal-prog-bar" id="cal-bar" style="width:0%"></div></div>
    <div class="cal-grid" id="cal-grid">
      <div class="msg" style="grid-column:1/-1;">불러오는 중...</div>
    </div>
    <div class="cal-nav-foot">
      <button class="arrow" onclick="cPrev()">‹</button>
      <div id="cal-dots" style="display:flex;gap:6px;"></div>
      <button class="arrow" onclick="cNext()">›</button>
    </div>
  </div>

</div>

<script>
var SB  = 'https://byzulmxcuhsrjdphmuym.supabase.co/rest/v1/';
var KEY = 'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs';
var HDR = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

function sbGet(table, qs) {
  return fetch(SB + table + '?' + qs, { headers: HDR }).then(function(r){ return r.json(); });
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pad(n){ return String(n).padStart(2,'0'); }
function isDark(h){
  if(!h||h.length<7) return false;
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return (r*.299+g*.587+b*.114)<128;
}

/* ── 채용공고 카드 ── */
var JP=6, jPage=0, jPages=[];

function buildCards(){
  var g=document.getElementById('cards');
  if(!jPages.length){g.innerHTML='<div class="msg" style="grid-column:1/-1;">채용공고가 없습니다.</div>';return;}
  var rows=jPages[jPage];
  g.innerHTML=rows.map(function(r){
    var d=new Date(r.created_at);
    var ds=d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+'.';
    var bg=(/^#[0-9a-fA-F]{6}$/.test(r.bg_color||''))?r.bg_color:'#FFFFFF';
    var dk=isDark(bg);
    var tc=dk?'#fff':'#1E293B', sc=dk?'rgba(255,255,255,.6)':'#94A3B8';
    var nb=dk?'rgba(255,255,255,.2)':'#EFF6FF', nc=dk?'#fff':'#1E4D8C';
    var logo=r.logo_url?'<img src="'+r.logo_url+'" alt=""/>':'';
    var inner=logo
      +'<span class="card-name" style="background:'+nb+';color:'+nc+';">'+esc(r.school_name)+'</span>'
      +'<p class="card-title" style="color:'+tc+';">'+esc(r.title)+'</p>'
      +'<p class="card-date" style="color:'+sc+';">'+ds+'</p>';
    return r.link
      ?'<a href="'+r.link+'" target="_blank" class="card" style="background:'+bg+';">'+inner+'</a>'
      :'<div class="card" style="background:'+bg+';">'+inner+'</div>';
  }).join('');
  buildJDots();
}
function buildJDots(){
  document.getElementById('dots').innerHTML=jPages.map(function(_,i){
    return '<button class="dot" onclick="jGo('+i+')" style="width:'+(i===jPage?'20px':'8px')+';background:'+(i===jPage?'#1E4D8C':'#CBD5E1')+';"></button>';
  }).join('');
}
function jGo(p){jPage=p;buildCards();}
function jNext(){jGo((jPage+1)%jPages.length);}
function jPrev(){jGo((jPage-1+jPages.length)%jPages.length);}

sbGet('job_postings','select=*&order=sort_order.asc').then(function(data){
  var g=document.getElementById('cards');
  if(!Array.isArray(data)){
    g.innerHTML='<div class="err" style="grid-column:1/-1;">오류: '+JSON.stringify(data).substring(0,120)+'</div>';return;
  }
  if(!data.length){buildCards();return;}
  document.getElementById('jobs-count').textContent='총 '+data.length+'건';
  for(var i=0;i<data.length;i+=JP) jPages.push(data.slice(i,i+JP));
  buildCards();
  document.getElementById('nav-row').style.display='flex';
  setInterval(jNext,5000);
}).catch(function(e){
  document.getElementById('cards').innerHTML='<div class="err" style="grid-column:1/-1;">연결 오류: '+e.message+'</div>';
});

/* ── 채용달력 (가로 그리드 10개) ── */
var CP=10, cPage=0, cData=[], cTimer=null;

function tpClass(t){return t==='시작'?'tp-s':t==='마감'?'tp-e':t==='인적성'?'tp-a':'tp-o';}

function showCal(){
  if(!cData.length) return;
  var pages=Math.ceil(cData.length/CP);
  var sl=cData.slice(cPage*CP, cPage*CP+CP);
  var d0=sl[0].event_date||'', d1=sl[sl.length-1].event_date||'';
  document.getElementById('cal-range').textContent=(d0===d1?d0:d0+' ~ '+d1);
  document.getElementById('cal-pg').textContent=(cPage+1)+'/'+pages;
  document.getElementById('cal-count').textContent='총 '+cData.length+'건';
  document.getElementById('cal-bar').style.width=Math.round((cPage+1)/pages*100)+'%';

  document.getElementById('cal-grid').innerHTML=sl.map(function(e){
    return '<div class="cal-cell">'
      +'<span class="cal-cell-dt">'+esc(e.event_date)+'</span>'
      +'<span class="cal-cell-tp '+tpClass(e.event_type)+'">'+esc(e.event_type)+'</span>'
      +'<span class="cal-cell-co">'+esc(e.company)+'</span>'
      +'</div>';
  }).join('');

  document.getElementById('cal-dots').innerHTML=Array.from({length:pages},function(_,i){
    return '<button class="dot" onclick="cGo('+i+')" style="width:'+(i===cPage?'20px':'8px')+';background:'+(i===cPage?'#1E4D8C':'#CBD5E1')+';"></button>';
  }).join('');
}

function cGo(p){cPage=p;showCal();}
function cNext(){cGo((cPage+1)%Math.ceil(cData.length/CP));}
function cPrev(){cGo((cPage-1+Math.ceil(cData.length/CP))%Math.ceil(cData.length/CP));}

sbGet('job_calendar','select=company,event_date,event_type&order=event_date.asc').then(function(data){
  var g=document.getElementById('cal-grid');
  if(!Array.isArray(data)){
    g.innerHTML='<div class="err" style="grid-column:1/-1;">오류: '+JSON.stringify(data).substring(0,150)+'</div>';return;
  }
  cData=data;
  if(!cData.length){g.innerHTML='<div class="msg" style="grid-column:1/-1;">등록된 데이터가 없습니다.</div>';return;}
  showCal();
  cTimer=setInterval(cNext,5000);
}).catch(function(e){
  document.getElementById('cal-grid').innerHTML='<div class="err" style="grid-column:1/-1;">연결 오류: '+e.message+'</div>';
});
</script>
</body>
</html>
