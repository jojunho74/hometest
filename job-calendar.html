<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>채용달력 — G-TELP IBT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#F8FAFF;color:#1E293B;}
    header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #E2E8F0;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .hinner{max-width:1100px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .hlogo{font-size:1rem;font-weight:800;color:#1E4D8C;text-decoration:none;white-space:nowrap;flex-shrink:0;}
    .hnav{display:flex;align-items:center;gap:4px;font-size:0.8rem;font-weight:600;}
    .hnav a{color:#475569;text-decoration:none;transition:background .18s,color .18s;padding:5px 9px;border-radius:8px;font-size:0.78rem;}
    .hnav a:hover,.hnav a.active{background:#1E4D8C;color:#fff;}
    .hbtn{padding:8px 18px;border-radius:8px;font-size:0.8rem;font-weight:700;background:#1E4D8C;color:#fff;text-decoration:none;transition:background .15s;}
    .hbtn:hover{background:#163870;}
    .hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:#1E4D8C;border:none;padding:6px;border-radius:8px;}
    .hamburger span{display:block;height:2px;background:#fff;border-radius:2px;}
    .mobile-menu{display:none;flex-direction:column;background:#fff;border-top:1px solid #E2E8F0;padding:12px 16px 16px;}
    .mobile-menu a{padding:12px 4px;font-size:0.9rem;font-weight:600;color:#1E293B;text-decoration:none;border-bottom:1px solid #F1F5F9;}
    .mobile-menu a:last-child{border-bottom:none;}
    .mobile-menu .mbtn{margin-top:12px;display:block;text-align:center;padding:12px;border-radius:8px;background:#1E4D8C;color:#fff;font-weight:700;text-decoration:none;}
    .mobile-menu.open{display:flex;}
    @media(max-width:640px){.hnav{display:none;}.hbtn{display:none;}.hamburger{display:flex;}}

    /* 캘린더 레이아웃 */
    .cal-wrap{max-width:1100px;margin:0 auto;padding:32px 16px 60px;}
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .cal-nav-btn{width:40px;height:40px;border:none;border-radius:50%;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.12);cursor:pointer;font-size:20px;color:#1E293B;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .cal-nav-btn:hover{background:#EFF6FF;}
    .cal-title{font-size:1.4rem;font-weight:800;color:#1E293B;}
    .cal-today-btn{padding:6px 16px;border:1.5px solid #CBD5E1;border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#475569;transition:background .15s;}
    .cal-today-btn:hover{background:#F1F5F9;}

    /* 범례 */
    .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#475569;}
    .legend-dot{width:10px;height:10px;border-radius:2px;}

    /* 캘린더 그리드 */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);}
    .cal-dow{background:#F8FAFF;font-size:12px;font-weight:700;text-align:center;padding:10px 4px;color:#64748B;border-bottom:1px solid #E2E8F0;}
    .cal-dow:first-child{color:#EF4444;}
    .cal-dow:last-child{color:#3B82F6;}
    .cal-cell{min-height:110px;padding:6px;border-right:1px solid #E2E8F0;border-bottom:1px solid #E2E8F0;vertical-align:top;position:relative;}
    .cal-cell:nth-child(7n){border-right:none;}
    .cal-cell.other-month .cal-day{color:#CBD5E1;}
    .cal-cell.other-month{background:#FAFBFD;}
    .cal-cell.today{background:#EFF6FF;}
    .cal-cell.today .cal-day{background:#1E4D8C;color:#fff;border-radius:50%;}
    .cal-day{font-size:13px;font-weight:700;color:#1E293B;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
    .cal-cell.sunday .cal-day{color:#EF4444;}
    .cal-cell.saturday .cal-day{color:#3B82F6;}
    .cal-cell.today .cal-day{color:#fff!important;}

    /* 이벤트 뱃지 */
    .ev-badge{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;line-height:1.4;}
    .ev-badge:hover{opacity:.85;}
    .ev-start{background:#DBEAFE;color:#1E40AF;}
    .ev-end{background:#FEE2E2;color:#B91C1C;}
    .ev-apt{background:#FEF3C7;color:#92400E;}
    .ev-more{font-size:10px;color:#64748B;font-weight:600;cursor:pointer;padding:1px 4px;background:#F1F5F9;border-radius:4px;display:inline-block;margin-top:1px;}
    .ev-more:hover{background:#E2E8F0;}

    /* 모달 */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal-box{background:#fff;border-radius:16px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.18);}
    .modal-title{font-size:1rem;font-weight:800;color:#1E293B;margin-bottom:16px;}
    .modal-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F1F5F9;}
    .modal-item:last-child{border-bottom:none;}
    .modal-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
    .modal-company{font-size:14px;font-weight:600;color:#1E293B;}
    .modal-company a{color:#1E4D8C;text-decoration:none;}
    .modal-company a:hover{text-decoration:underline;}
    .modal-close{width:100%;padding:10px;border:none;border-radius:8px;background:#F1F5F9;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;color:#475569;}
    .modal-close:hover{background:#E2E8F0;}

    @media(max-width:640px){
      .cal-cell{min-height:70px;padding:3px;}
      .ev-badge{font-size:9px;padding:1px 3px;}
      .cal-title{font-size:1.1rem;}
    }
  </style>
</head>
<body>

<header>
  <div class="hinner">
    <a href="index.html" class="hlogo">지텔프IBT 대학컨설팅</a>
    <nav class="hnav">
      <a href="index.html#about">서비스 소개</a>
      <a href="package.html">패키지</a>
      <a href="schedule.html">정기시험 일정</a>
      <a href="student.html">IBT 학생 신청</a>
      <a href="library-pdf.html">채용공고 자료실</a>
      <a href="job-calendar.html" class="active">채용달력</a>
      <a href="gtelp-score.html">점수대비표</a>
    </nav>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="index.html#consultation-form" class="hbtn">무료 신청하기</a>
      <button class="hamburger" id="hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html#about">서비스 소개</a>
    <a href="package.html">패키지</a>
    <a href="schedule.html">정기시험 일정</a>
    <a href="student.html">IBT 학생 신청</a>
    <a href="library-pdf.html">채용공고 자료실</a>
    <a href="job-calendar.html">채용달력</a>
    <a href="gtelp-score.html">점수대비표</a>
    <a href="index.html#consultation-form" class="mbtn">무료 신청하기</a>
  </div>
</header>

<div class="cal-wrap">
  <!-- 헤더 -->
  <div class="cal-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="cal-title" id="cal-title">2026년 4월</span>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <button class="cal-today-btn" onclick="goToday()">오늘</button>
  </div>

  <!-- 범례 -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1E40AF;"></div>시작</div>
    <div class="legend-item"><div class="legend-dot" style="background:#B91C1C;"></div>마감</div>
    <div class="legend-item"><div class="legend-dot" style="background:#92400E;"></div>인적성</div>
    <div class="legend-item"><div class="legend-dot" style="background:#475569;"></div>기타</div>
    <div id="cal-count" style="margin-left:auto;font-size:12px;color:#94A3B8;font-weight:600;"></div>
  </div>

  <!-- 캘린더 그리드 -->
  <div class="cal-grid" id="cal-grid">
    <div class="cal-dow">일</div>
    <div class="cal-dow">월</div>
    <div class="cal-dow">화</div>
    <div class="cal-dow">수</div>
    <div class="cal-dow">목</div>
    <div class="cal-dow">금</div>
    <div class="cal-dow">토</div>
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:#94A3B8;">불러오는 중...</div>
  </div>
</div>

<!-- 이벤트 모달 -->
<div class="modal-overlay" id="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title" id="modal-date-title"></div>
    <div id="modal-list"></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const _sb = createClient(
    'https://byzulmxcuhsrjdphmuym.supabase.co',
    'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs'
  );

  const today = new Date();
  let curYear = today.getFullYear();
  let curMonth = today.getMonth(); // 0-indexed
  let allEvents = [];

  const TYPE_CLASS = { '시작':'ev-start', '마감':'ev-end', '인적성':'ev-apt' };
  const TYPE_TAG   = { '시작':'ev-start', '마감':'ev-end', '인적성':'ev-apt' };

  function goToday() { curYear = today.getFullYear(); curMonth = today.getMonth(); renderCalendar(); }
  function changeMonth(dir) { curMonth += dir; if(curMonth > 11){curMonth=0;curYear++;} if(curMonth < 0){curMonth=11;curYear--;} renderCalendar(); }

  function renderCalendar() {
    document.getElementById('cal-title').textContent = `${curYear}년 ${curMonth+1}월`;

    const firstDay = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    const daysInPrev  = new Date(curYear, curMonth, 0).getDate();

    // 이번달 이벤트만 필터
    const pad = n => String(n).padStart(2,'0');
    const monthStr = `${curYear}-${pad(curMonth+1)}`;
    const monthEvents = allEvents.filter(e => e.event_date && e.event_date.startsWith(monthStr));
    document.getElementById('cal-count').textContent = `이번달 ${monthEvents.length}건`;

    // 날짜별 이벤트 맵
    const evMap = {};
    monthEvents.forEach(e => {
      const day = parseInt(e.event_date.split('-')[2]);
      if (!evMap[day]) evMap[day] = [];
      evMap[day].push(e);
    });

    const MAX_SHOW = 4;
    const grid = document.getElementById('cal-grid');

    // 요일 헤더 유지
    const dow = ['일','월','화','수','목','금','토'].map(d => `<div class="cal-dow">${d}</div>`).join('');

    let cells = '';
    let totalCells = firstDay + daysInMonth;
    const rows = Math.ceil(totalCells / 7);
    const cellCount = rows * 7;

    for (let i = 0; i < cellCount; i++) {
      let day, isOther = false, isToday = false;
      if (i < firstDay) {
        day = daysInPrev - firstDay + 1 + i;
        isOther = true;
      } else if (i >= firstDay + daysInMonth) {
        day = i - firstDay - daysInMonth + 1;
        isOther = true;
      } else {
        day = i - firstDay + 1;
        isToday = (day === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear());
      }

      const dow_idx = i % 7;
      let cls = 'cal-cell';
      if (isOther) cls += ' other-month';
      if (isToday) cls += ' today';
      if (dow_idx === 0 && !isOther) cls += ' sunday';
      if (dow_idx === 6 && !isOther) cls += ' saturday';

      let evHtml = '';
      if (!isOther && evMap[day]) {
        const evs = evMap[day];
        const show = evs.slice(0, MAX_SHOW);
        show.forEach(e => {
          const tc = TYPE_CLASS[e.event_type] || 'ev-apt';
          const co = (e.company || '').length > 8 ? e.company.substring(0,8)+'…' : (e.company || '');
          const label = e.event_type === '시작' ? '시' : e.event_type === '마감' ? '마' : e.event_type === '인적성' ? '인' : '기';
          evHtml += `<div class="ev-badge ${tc}" onclick="openDayModal(${curYear},${curMonth+1},${day})" title="${e.company}"><span>${label}</span><span style="overflow:hidden;text-overflow:ellipsis;">${co}</span></div>`;
        });
        if (evs.length > MAX_SHOW) {
          evHtml += `<div class="ev-more" onclick="openDayModal(${curYear},${curMonth+1},${day})">+${evs.length - MAX_SHOW}더보기</div>`;
        }
      }

      cells += `<div class="${cls}"><div class="cal-day">${day}</div>${evHtml}</div>`;
    }

    grid.innerHTML = dow + cells;
  }

  function openDayModal(y, m, d) {
    const pad = n => String(n).padStart(2,'0');
    const dateStr = `${y}-${pad(m)}-${pad(d)}`;
    const dayEvents = allEvents.filter(e => e.event_date === dateStr);

    const DAYS = ['일','월','화','수','목','금','토'];
    const dt = new Date(y, m-1, d);
    document.getElementById('modal-date-title').textContent = `${y}년 ${m}월 ${d}일 (${DAYS[dt.getDay()]}) — ${dayEvents.length}건`;

    const sorted = [...dayEvents].sort((a,b) => {
      const order = {'시작':0,'마감':1,'인적성':2};
      return (order[a.event_type]??3) - (order[b.event_type]??3);
    });

    document.getElementById('modal-list').innerHTML = sorted.map(e => {
      const tc = TYPE_CLASS[e.event_type] || 'ev-apt';
      const linkHtml = e.link
        ? `<a href="${e.link}" target="_blank" class="modal-company">${e.company}</a>`
        : `<span class="modal-company">${e.company}</span>`;
      return `<div class="modal-item">
        <span class="modal-tag ${tc}">${e.event_type||'기타'}</span>
        <div>${linkHtml}${e.category ? `<div style="font-size:11px;color:#94A3B8;margin-top:2px;">${e.category}</div>` : ''}</div>
      </div>`;
    }).join('') || '<p style="color:#94A3B8;font-size:14px;">이벤트가 없습니다.</p>';

    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  // 키보드 ESC로 모달 닫기
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

  // 데이터 로드
  (async function() {
    const { data, error } = await _sb.from('job_calendar').select('*').order('event_date', { ascending: true });
    if (error) { console.error('calendar load error:', error); return; }
    allEvents = data || [];
    renderCalendar();
  })();
</script>
</body>
</html>
