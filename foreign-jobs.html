  <style>
    html,body{font-family:"Noto Sans KR","Apple SD Gothic Neo",sans-serif;background:#0A1628;color:#fff;-webkit-text-size-adjust:100%;}

    /* ── 헤더 ── */
    .nav-link{padding:5px 9px;border-radius:8px;color:rgba(255,255,255,.75);text-decoration:none;transition:background .18s,color .18s;font-size:.78rem;font-weight:600;white-space:nowrap;}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,.12);color:#fff;}
    .mobile-menu{display:none;flex-direction:column;background:#0D1B2A;border-top:1px solid rgba(255,255,255,.1);padding:12px 16px 16px;position:sticky;top:64px;z-index:49;box-shadow:0 4px 12px rgba(0,0,0,.4);}
    .mobile-menu a{padding:12px 4px;font-size:.9rem;font-weight:600;color:rgba(255,255,255,.85);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.08);}
    .mobile-menu a:last-child{border-bottom:none;}
    .mobile-menu .m-cta{margin-top:12px;display:block;text-align:center;padding:12px;border-radius:50px;background:linear-gradient(135deg,#1E4D8C,#0891B2);color:#fff;font-weight:700;text-decoration:none;}
    .mobile-menu.open{display:flex;}
    .hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:rgba(255,255,255,.12);border:none;padding:6px;border-radius:8px;}
    .hamburger span{display:block;height:2px;background:#fff;border-radius:2px;transition:transform .25s,opacity .25s;}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    @media(max-width:768px){.hamburger{display:flex;}}

    /* ── 카드 ── */
    .fj-card{background:#fff;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .18s,box-shadow .18s;box-shadow:0 2px 12px rgba(0,0,0,.18);}
    .fj-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.28);}
    .fj-card.no-link{cursor:default;}
    .fj-card.no-link:hover{transform:none;box-shadow:0 2px 12px rgba(0,0,0,.18);}
    .fj-logo-wrap{display:flex;align-items:center;justify-content:center;height:96px;padding:16px;background:#fff;}
    .fj-logo-wrap img{max-height:64px;max-width:100%;object-fit:contain;}
    .fj-logo-placeholder{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:#EEF2FF;}
    .fj-body{padding:14px 16px 16px;display:flex;flex-direction:column;flex:1;background:#fff;}
    .fj-company{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:8px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .fj-title{font-size:13px;font-weight:700;color:#0F172A;line-height:1.45;margin-bottom:auto;flex:1;}
    .fj-date{font-size:11px;color:#94A3B8;margin-top:10px;padding-top:8px;border-top:1px solid #F1F5F9;}

    /* ── 스켈레톤 ── */
    .skel{background:linear-gradient(90deg,rgba(255,255,255,.07) 25%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.07) 75%);background-size:400% 100%;animation:skel-anim 1.4s ease infinite;border-radius:18px;height:180px;}
    @keyframes skel-anim{0%{background-position:100% 0}100%{background-position:-100% 0}}

    /* ── 페이지네이션 ── */
    .pg-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .15s,border-color .15s;}
    .pg-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35);}
    .pg-btn.active{background:#1E4D8C;border-color:#3B82F6;}
    .pg-btn:disabled{opacity:.3;cursor:not-allowed;}

    /* ── 히어로 ── */
    .hero-wrap{padding:52px 24px 40px;text-align:center;background:linear-gradient(160deg,#060D1F 0%,#0D1F4A 55%,#112B60 100%);border-bottom:1px solid rgba(255,255,255,.06);}
    .hero-badge{display:inline-block;padding:4px 14px;border-radius:50px;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.1);color:#93C5FD;border:1px solid rgba(255,255,255,.18);margin-bottom:14px;}
    .hero-title{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;letter-spacing:-.5px;line-height:1.25;color:#fff;}
    .hero-sub{font-size:.95rem;color:rgba(255,255,255,.6);margin-top:10px;line-height:1.65;}

    /* ── 통계 뱃지 ── */
    .stat-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-size:.75rem;font-weight:600;color:rgba(255,255,255,.75);}

    /* ── 빈 상태 ── */
    .empty-state{text-align:center;padding:60px 20px;}
    .empty-state svg{opacity:.35;margin:0 auto 16px;}
    .empty-state p{color:rgba(255,255,255,.45);font-size:.9rem;}
  </style>
</head>

<!-- ── 히어로 ── -->
<section class="hero-wrap">
  <div class="hero-badge">해외유학생 · 취업정보</div>
  <h1 class="hero-title">해외유학생 채용정보</h1>
  <p class="hero-sub">국내외 기업·기관에서 해외유학생을 위한 채용공고를 모았습니다</p>
  <div class="flex flex-wrap justify-center gap-2 mt-5">
    <div class="stat-chip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><path d="M8 7V5a2 2 0 0 0-4 0v2"/></svg>
      <span id="stat-total">불러오는 중...</span>
    </div>
    <div class="stat-chip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="stat-updated">최신 업데이트</span>
    </div>
  </div>
</section>

<!-- ── 메인 콘텐츠 ── -->
<main class="max-w-6xl mx-auto px-4 py-10">

  <!-- 검색 바 -->
  <div class="flex flex-wrap items-center gap-3 mb-8">
    <div class="relative flex-1" style="min-width:220px;max-width:360px;">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 opacity-40" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="fj-search" type="text" placeholder="기관명 또는 제목 검색..."
        class="w-full pl-9 pr-4 py-2.5 rounded-xl text-sm font-medium"
        style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;outline:none;"
        oninput="onSearch()"
        onfocus="this.style.borderColor='rgba(96,165,250,.7)'"
        onblur="this.style.borderColor='rgba(255,255,255,.18)'"/>
    </div>
    <div class="text-sm font-semibold" style="color:rgba(255,255,255,.45);" id="result-count"></div>
  </div>

  <!-- 카드 그리드 -->
  <div id="fj-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 mb-8">
    <!-- 스켈레톤 -->
    <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>

  <!-- 빈 상태 -->
  <div id="fj-empty" class="empty-state hidden">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><path d="M8 7V5a2 2 0 0 0-4 0v2"/></svg>
    <p id="fj-empty-msg">등록된 채용공고가 없습니다.</p>
  </div>

  <!-- 페이지네이션 -->
  <div id="fj-pagination" class="flex items-center justify-center gap-2 mt-2"></div>

</main>

<!-- ── 푸터 ── -->
<footer style="background:#060D1F;border-top:1px solid rgba(255,255,255,.07);padding:28px 24px;text-align:center;">
  <p style="font-size:.75rem;color:rgba(255,255,255,.3);line-height:1.8;">
    해외유학생 채용정보 · G-TELP IBT 대학컨설팅<br>
    <a href="index.html" style="color:rgba(255,255,255,.4);text-decoration:none;">ibtcc.kr</a>
  </p>
</footer>

<script>
  const SB = 'https://byzulmxcuhsrjdphmuym.supabase.co';
  const KEY = 'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs';
  const PER_PAGE = 12;

  let allJobs = [];
  let filtered = [];
  let curPage  = 0;

  // 배지 색상 팔레트 (bg_color가 흰색/없을 때 기관명 배지 색상)
  const PALETTE = [
    { bg:'#EFF6FF', color:'#1D4ED8' },
    { bg:'#F0FDFA', color:'#0F766E' },
    { bg:'#FFF7ED', color:'#C2410C' },
    { bg:'#F0FDF4', color:'#15803D' },
    { bg:'#FDF4FF', color:'#9333EA' },
    { bg:'#FFF1F2', color:'#BE123C' },
  ];

  function badgeStyle(idx) {
    const p = PALETTE[idx % PALETTE.length];
    return `background:${p.bg};color:${p.color};`;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cardHTML(r, idx) {
    const hasLink = !!r.link;
    const cardClass = 'fj-card' + (hasLink ? '' : ' no-link');
    const clickAttr = hasLink ? `onclick="window.open('${esc(r.link)}','_blank')"` : '';

    const logoSection = r.logo_url
      ? `<div class="fj-logo-wrap"><img src="${esc(r.logo_url)}" alt="${esc(r.school_name)} 로고" loading="lazy"/></div>`
      : `<div class="fj-logo-wrap"><div class="fj-logo-placeholder">🏢</div></div>`;

    return `<div class="${cardClass}" ${clickAttr} title="${hasLink ? '클릭하여 공고 확인' : ''}">
      ${logoSection}
      <div class="fj-body">
        <span class="fj-company" style="${badgeStyle(idx)}">${esc(r.school_name)}</span>
        <div class="fj-title">${esc(r.title)}</div>
        <div class="fj-date">${formatDate(r.created_at)}</div>
      </div>
    </div>`;
  }

  function render(page) {
    curPage = page;
    const grid = document.getElementById('fj-grid');
    const empty = document.getElementById('fj-empty');
    const emptyMsg = document.getElementById('fj-empty-msg');
    const pagination = document.getElementById('fj-pagination');

    if (!filtered.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      emptyMsg.textContent = document.getElementById('fj-search').value.trim()
        ? '검색 결과가 없습니다.' : '등록된 채용공고가 없습니다.';
      pagination.innerHTML = '';
      return;
    }

    empty.classList.add('hidden');
    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    const slice = filtered.slice(page * PER_PAGE, (page + 1) * PER_PAGE);
    grid.innerHTML = slice.map((r, i) => cardHTML(r, filtered.indexOf(r))).join('');

    // 페이지네이션
    if (totalPages <= 1) { pagination.innerHTML = ''; return; }
    const btnBase = 'pg-btn';
    let html = `<button class="${btnBase}" onclick="render(${page-1})" ${page===0?'disabled':''}>‹</button>`;
    const start = Math.max(0, page - 2);
    const end   = Math.min(totalPages - 1, page + 2);
    if (start > 0) html += `<button class="${btnBase}" onclick="render(0)">1</button>${start>1?'<span style="color:rgba(255,255,255,.3);font-size:.75rem;">…</span>':''}`;
    for (let i = start; i <= end; i++) {
      html += `<button class="${btnBase}${i===page?' active':''}" onclick="render(${i})">${i+1}</button>`;
    }
    if (end < totalPages - 1) html += `${end<totalPages-2?'<span style="color:rgba(255,255,255,.3);font-size:.75rem;">…</span>':''}<button class="${btnBase}" onclick="render(${totalPages-1})">${totalPages}</button>`;
    html += `<button class="${btnBase}" onclick="render(${page+1})" ${page===totalPages-1?'disabled':''}>›</button>`;
    pagination.innerHTML = html;
  }

  function onSearch() {
    const q = document.getElementById('fj-search').value.trim().toLowerCase();
    filtered = q
      ? allJobs.filter(r => (r.school_name||'').toLowerCase().includes(q) || (r.title||'').toLowerCase().includes(q))
      : [...allJobs];
    document.getElementById('result-count').textContent =
      q ? `${filtered.length}건 검색됨` : '';
    render(0);
  }

  async function load() {
    try {
      const res = await fetch(SB + '/rest/v1/foreign_job_postings?select=*&order=sort_order.asc', {
        headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
      });
      if (!res.ok) throw new Error('fetch error ' + res.status);
      allJobs = await res.json();
      filtered = [...allJobs];

      // 통계 업데이트
      document.getElementById('stat-total').textContent = `${allJobs.length}개 공고`;
      if (allJobs.length > 0) {
        const latest = allJobs.reduce((a, b) => new Date(a.created_at) > new Date(b.created_at) ? a : b);
        document.getElementById('stat-updated').textContent = formatDate(latest.created_at);
      }

      render(0);
    } catch(e) {
      document.getElementById('fj-grid').innerHTML =
        '<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,.4);">데이터를 불러오는 중 오류가 발생했습니다.</div>';
    }

    // 페이지 조회 기록
    try {
      fetch(SB + '/rest/v1/page_views', {
        method: 'POST',
        headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ page: 'foreign-jobs.html', referrer: document.referrer || null })
      });
    } catch(_) {}
  }

  function toggleMenu() {
    const m = document.getElementById('mobile-menu');
    const h = document.getElementById('hamburger');
    m.classList.toggle('open');
    h.classList.toggle('open');
  }

  load();
</script>
</body>
