<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>대학 카드뉴스 — 지텔프IBT</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --blue:#3182F6;
      --bg:#F2F4F6;
      --white:#FFFFFF;
      --text:#191919;
      --sub:#8B95A1;
      --border:#E5E8EB;
    }
    html,body{font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%;}

    /* ── 헤더 ── */
    .hdr{position:sticky;top:0;z-index:50;height:52px;background:var(--white);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);}
    .hdr-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text);text-decoration:none;flex-shrink:0;}
    .hdr-title{flex:1;text-align:center;font-size:17px;font-weight:700;letter-spacing:-.3px;}
    .hdr-count{font-size:12px;font-weight:600;color:var(--sub);flex-shrink:0;width:32px;text-align:right;}

    /* ── 본문 ── */
    .body{padding:16px 16px 48px;}

    /* ── 카드 ── */
    .card{background:var(--white);border-radius:18px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
    .card-img{width:100%;height:200px;object-fit:cover;display:block;background:#1E3A5F;}
    .card-img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,#1e3a8a,#0891b2);display:flex;align-items:center;justify-content:center;}
    .card-body{padding:16px;}
    .card-school{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.04em;margin-bottom:6px;}
    .card-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:6px;letter-spacing:-.3px;}
    .card-subtitle{font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:8px;}
    .card-content{font-size:12px;color:#64748B;line-height:1.6;border-left:3px solid #DBEAFE;padding-left:10px;margin-bottom:12px;}
    .card-footer{display:flex;align-items:center;justify-content:space-between;}
    .card-date{font-size:12px;color:var(--sub);}
    .card-views{font-size:12px;color:var(--sub);}
    .card-link{display:block;margin-top:12px;text-align:center;padding:10px;border-radius:10px;background:#EFF6FF;color:var(--blue);font-size:13px;font-weight:700;text-decoration:none;}
    .card-link:active{opacity:.7;}

    /* ── 로딩 ── */
    .loading{padding:60px 20px;text-align:center;color:var(--sub);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── 빈 상태 ── */
    .empty{padding:60px 20px;text-align:center;color:var(--sub);font-size:14px;}
  </style>
</head>
<body>

<header class="hdr">
  <a href="../mobile.html" class="hdr-back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="hdr-title">대학 카드뉴스</div>
  <div class="hdr-count" id="hdrCount"></div>
</header>

<div class="body" id="cardList">
  <div class="loading">
    <div class="spinner"></div>
    <div>불러오는 중...</div>
  </div>
</div>

<script>
const SB  = 'https://byzulmxcuhsrjdphmuym.supabase.co';
const KEY = 'sb_publishable_2PyrmnCuS9tZkoyp8tadwQ_mmA9BeLs';

fetch(SB + '/rest/v1/card_news?status=eq.published&order=published_at.desc', {
  headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
})
.then(r => r.json())
.then(rows => {
  const list = document.getElementById('cardList');
  const countEl = document.getElementById('hdrCount');
  if (!rows || !rows.length) {
    list.innerHTML = '<div class="empty">등록된 카드뉴스가 없습니다</div>';
    return;
  }
  countEl.textContent = rows.length + '개';
  list.innerHTML = rows.map(r => {
    let imgs = [];
    try { imgs = Array.isArray(r.images) ? r.images : JSON.parse(r.images || '[]'); } catch(e){}
    const imgSrc = r.selected_image || imgs[0] || '';
    const imgHtml = imgSrc
      ? `<img class="card-img" src="${imgSrc}" alt="${r.title||''}" onerror="this.style.display='none'">`
      : `<div class="card-img-placeholder"></div>`;
    const date = r.article_date || (r.published_at ? r.published_at.slice(0,10) : '');
    const views = r.view_count != null ? `<span class="card-views">조회 ${Number(r.view_count).toLocaleString()}</span>` : '';
    const subtitle = r.subtitle ? `<div class="card-subtitle">${r.subtitle.slice(0,80)}</div>` : '';
    const content  = r.content  ? `<div class="card-content">${r.content.slice(0,120)}</div>` : '';
    const link     = r.original_url ? `<a href="${r.original_url}" target="_blank" class="card-link">원문 보기</a>` : '';
    return `<div class="card">
      ${imgHtml}
      <div class="card-body">
        ${r.school_name ? `<div class="card-school">${r.school_name}</div>` : ''}
        <div class="card-title">${(r.title||'').slice(0,60)}</div>
        ${subtitle}
        ${content}
        <div class="card-footer">
          <span class="card-date">${date}</span>
          ${views}
        </div>
        ${link}
      </div>
    </div>`;
  }).join('');
})
.catch(() => {
  document.getElementById('cardList').innerHTML = '<div class="empty">데이터를 불러올 수 없습니다</div>';
});
</script>
</body>
</html>
